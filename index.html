// Find the plan row for today + offset days (negative = past, positive = future).
function findPlanForOffset(offset) {
  const planData = state.data && state.data.plan;
  if (!planData || !planData.rows) return null;
  const target = new Date();
  target.setDate(target.getDate() + (offset || 0));
  const key = target.getMonth() + ':' + target.getDate();
  return planData.rows.find(r => r.dateKey === key) || null;
}

function offsetLabel(offset) {
  return offset === -1 ? 'Yesterday' : offset === 1 ? 'Tomorrow' : 'Today';
}

// Center the today slide on render and keep the dots in sync as the user
// swipes. Uses native scroll-snap so the gesture feels physical.
function initSuggestionSwiper() {
  const swiper = document.getElementById('sgSwiper');
  if (!swiper) return;
  // Find the today slide (offset=0) and snap to it without animation on first
  // paint. Without this, the scroller would default to the first slide
  // (yesterday) which isn't what the user wants to see by default.
  const slides = swiper.querySelectorAll('.sg-slide');
  let today = null;
  slides.forEach(s => { if (s.dataset.slideOffset === '0') today = s; });
  if (today) {
    // Use scrollLeft directly so it's instant + ignores smooth-scroll CSS.
    swiper.scrollLeft = today.offsetLeft;
  }
  // Update dot indicator as the user scrolls.
  const dots = document.querySelectorAll('.sg-dot');
  const updateDots = () => {
    const center = swiper.scrollLeft + swiper.clientWidth / 2;
    let activeOffset = 0;
    let bestDist = Infinity;
    slides.forEach(s => {
      const sCenter = s.offsetLeft + s.offsetWidth / 2;
      const d = Math.abs(sCenter - center);
      if (d < bestDist) { bestDist = d; activeOffset = parseInt(s.dataset.slideOffset, 10) || 0; }
    });
    dots.forEach(dot => {
      dot.classList.toggle('on', parseInt(dot.dataset.dot, 10) === activeOffset);
    });
    state.suggestionDayOffset = activeOffset;
  };
  swiper.addEventListener('scroll', () => {
    // Throttle via rAF — scroll fires a lot.
    if (swiper._rafId) return;
    swiper._rafId = requestAnimationFrame(() => {
      swiper._rafId = null;
      updateDots();
    });
  }, { passive: true });
  // Tap a dot to jump to that slide.
  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      const offset = parseInt(dot.dataset.dot, 10) || 0;
      const target = swiper.querySelector('[data-slide-offset="' + offset + '"]');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    });
  });
}

// Home suggestion card: a horizontal scroll-snap container with three slides
// (yesterday, today, tomorrow). Today is centered on initial render. Users
// swipe left/right with the finger to move between days. Dots below indicate
// position. Returns '' when no plan is set up at all.
function renderSuggestionCard() {
  const planData = state.data && state.data.plan;
  if (!planData || !planData.rows || !planData.rows.length) return '';

  const slides = [-1, 0, 1].map(offset => {
    const p = findPlanForOffset(offset);
    const inner = p
      ? renderSuggestionContent(p, offset)
      : `<div class="suggestion-card sg-empty-slide">
           <div class="sg-empty-label">${escapeHtml(offsetLabel(offset))}</div>
           <div class="sg-empty">Outside the training block</div>
         </div>`;
    return `<div class="sg-slide" data-slide-offset="${offset}">${inner}</div>`;
  }).join('');

  return `
    <div class="suggestion-wrap">
      <div class="sg-swiper" id="sgSwiper">
        ${slides}
      </div>
      <div class="sg-dots">
        <span class="sg-dot" data-dot="-1"></span>
        <span class="sg-dot on" data-dot="0"></span>
        <span class="sg-dot" data-dot="1"></span>
      </div>
    </div>
  `;
}

function renderSuggestionContent(p, offset) {
  const meta = sessionMetaFromPlan(p);
  const status = (p.status || '').toString().trim().toUpperCase();
  const isPending = !status;
  const isToday = offset === 0;
  const subline = [
    p.runKm ? p.runKm + ' km' : null,
    p.targetPace ? '@ ' + p.targetPace : null
  ].filter(Boolean).join(' · ');
  const statusBadge = renderPlanStatusBadge(status);

  let actions = '';
  if (isToday && isPending && meta.actionType) {
    actions = `
      <button class="btn btn-primary btn-block sg-start" data-plan-action="${meta.actionType}" data-plan-runtype="${meta.runType || ''}">
        Start this session →
      </button>
      <div class="sg-secondary">
        <button class="sg-link" data-plan-status="SKIPPED" data-plan-date="${escapeHtml(p.date)}">Skip</button>
        <span class="sg-sep">·</span>
        <button class="sg-link" data-plan-status="POSTPONED" data-plan-date="${escapeHtml(p.date)}">Postpone</button>
      </div>
    `;
  } else if (isToday && isPending) {
    actions = `
      <div class="sg-rest">${escapeHtml(meta.restMessage || '')}</div>
      <div class="sg-secondary">
        <button class="sg-link" data-plan-status="DONE" data-plan-date="${escapeHtml(p.date)}">Mark done</button>
        <span class="sg-sep">·</span>
        <button class="sg-link" data-plan-status="SKIPPED" data-plan-date="${escapeHtml(p.date)}">Skip</button>
      </div>
    `;
  } else if (isToday && !isPending) {
    actions = `
      <div class="sg-secondary">
        <button class="sg-link" data-plan-status="" data-plan-date="${escapeHtml(p.date)}">Undo</button>
      </div>
    `;
  } else if (!isPending) {
    // Yesterday/Tomorrow: still let the user see the status; allow undo on yesterday.
    actions = offset === -1 ? `
      <div class="sg-secondary">
        <button class="sg-link" data-plan-status="" data-plan-date="${escapeHtml(p.date)}">Undo</button>
      </div>
    ` : '';
  }

  return `
    <div class="suggestion-card ${meta.tone} ${status ? 'status-' + status.toLowerCase() : ''}">
      <div class="sg-head">
        <span class="sg-kicker">${escapeHtml(p.date)} · Wk ${escapeHtml(String(p.week || ''))} ${escapeHtml(p.phase || '')}</span>
        ${statusBadge}
      </div>
      <div class="sg-main">
        <span class="sg-icon">${meta.emoji}</span>
        <div class="sg-text">
          <div class="sg-session">${escapeHtml(p.session || '')}</div>
          ${subline ? `<div class="sg-sub mono">${escapeHtml(subline)}</div>` : ''}
          ${p.notes ? `<div class="sg-notes">${escapeHtml(p.notes)}</div>` : ''}
        </div>
      </div>
      ${actions}
    </div>
  `;
}

function renderPlanStatusBadge(status) {
  if (status === 'DONE')      return '<span class="sg-badge done">✓ DONE</span>';
  if (status === 'SKIPPED')   return '<span class="sg-badge skipped">⊘ SKIPPED</span>';
  if (status === 'POSTPONED') return '<span class="sg-badge postponed">↪ POSTPONED</span>';
  return '';
}

// After a session/run is saved, find the matching plan row (same date AND
// matching session type) and mark it DONE if it's still pending. This makes
// the Plan tab's tick reflect work the user did via the regular flows
// (without having to also tap "Mark done" on the Suggestion card).
//
// `sessionDate` matches the user's display format (e.g. "May 4").
// `sessionTypeKey` is one of 'push' | 'pull' | 'legs' | 'cardio'.
async function autoMarkPlanDone(sessionDate, sessionTypeKey) {
  if (!sessionDate || !sessionTypeKey) return;
  const planData = state.data && state.data.plan;
  if (!planData || !planData.rows) return;

  // Find the plan row for this date.
  const target = (() => {
    const parsed = parseSheetDate(sessionDate);
    if (!parsed) return null;
    const key = parsed.getMonth() + ':' + parsed.getDate();
    return planData.rows.find(r => r.dateKey === key);
  })();
  if (!target) return;

  // Skip if already decided (DONE / SKIPPED / POSTPONED) — don't override
  // a deliberate Skip.
  if ((target.status || '').trim()) return;

  // Type match: lift columns directly, or session text for cardio.
  const lift = (target.lift || '').toLowerCase();
  const sess = (target.session || '').toLowerCase();
  const matches = (
    (sessionTypeKey === 'push'  && (lift === 'push' || sess.indexOf('push') !== -1)) ||
    (sessionTypeKey === 'pull'  && (lift === 'pull' || sess.indexOf('pull') !== -1)) ||
    (sessionTypeKey === 'legs'  && (lift === 'legs' || sess.indexOf('leg')  !== -1)) ||
    (sessionTypeKey === 'cardio' && /run|jog|interval|tempo|hmp|tune-up|strides|race/.test(sess))
  );
  if (!matches) return;

  // Optimistic local update + persist (silent — already toasted the save).
  target.status = 'DONE';
  try { await api('updatePlanStatus', { date: target.date, status: 'DONE' }); }
  catch (err) { /* swallow — the next loadData() will reconcile */ }
}

async function setPlanStatus(date, newStatus) {
  if (!date) return;
  try {
    await api('updatePlanStatus', { date: date, status: newStatus });
    // Optimistic local update on the matching row.
    const planData = state.data && state.data.plan;
    if (planData && planData.rows) {
      const row = planData.rows.find(r => r.date === date);
      if (row) row.status = newStatus;
    }
    render();
    await loadData();
  } catch (err) {
    toast('Could not update plan: ' + err.message, 'error');
  }
}

  const view = state.planView || 'weekly';
  const tabs = `
    <div class="plan-view-tabs">
      <button class="${view === 'weekly' ? 'on' : ''}" data-plan-tab="weekly">Weekly</button>
      <button class="${view === 'daily' ? 'on' : ''}" data-plan-tab="daily">Daily</button>
    </div>
  `;
  const body = view === 'weekly' ? renderPlanWeekly(planData) : renderPlanDaily(planData);
  return tabs + body;
}

function renderPlanWeekly(planData) {
  const todayKey = (() => { const d = new Date(); return d.getMonth() + ':' + d.getDate(); })();
  // Group rows by week.
  const byWeek = new Map();
  for (const r of planData.rows) {
    const k = r.week;
    if (!byWeek.has(k)) byWeek.set(k, []);
    byWeek.get(k).push(r);
  }
  // weeks summary in same order as backend
  const summaries = planData.weeks || [];
  return `
    <div class="plan-weekly">
      ${summaries.map(w => {
        const rows = byWeek.get(w.week) || [];
        return renderPlanWeekCard(w, rows, todayKey);
      }).join('')}
    </div>
  `;
}

function renderPlanWeekCard(summary, rows, todayKey) {
  const goal = [];
  if (summary.totalKm) goal.push(summary.totalKm + ' km total');
  if (summary.longKm) goal.push(summary.longKm + ' km long');
  if (summary.qualitySession) goal.push(summary.qualitySession);
  return `
    <div class="plan-week" data-week="${escapeHtml(String(summary.week))}">
      <div class="pw-head">
        <div>
          <div class="pw-title">Week ${escapeHtml(String(summary.week))} · ${escapeHtml(summary.phase)}</div>
          <div class="pw-range mono">${escapeHtml(summary.dateStart)} – ${escapeHtml(summary.dateEnd)}</div>
        </div>
        <div class="pw-goal mono">${escapeHtml(goal.join(' · '))}</div>
      </div>
      <ul class="pw-list" data-sortable-week="${escapeHtml(String(summary.week))}">
        ${rows.map((r, i) => renderPlanRowItem(r, i, todayKey)).join('')}
      </ul>
    </div>
  `;
}

function renderPlanRowItem(r, idx, todayKey) {
  const meta = sessionMetaFromPlan(r);
  const status = (r.status || '').toString().trim().toUpperCase();
  const isToday = r.dateKey === todayKey;
  const subline = [r.runKm ? r.runKm + ' km' : null, r.targetPace ? '@ ' + r.targetPace : null]
    .filter(Boolean).join(' · ');
  return `
    <li class="pw-item ${meta.tone}${isToday ? ' is-today' : ''}${status ? ' status-' + status.toLowerCase() : ''}"
        data-row-index="${idx}"
        data-row-date="${escapeHtml(r.date)}"
        data-row-session="${escapeHtml(r.session || '')}"
        data-row-runkm="${escapeHtml(r.runKm == null ? '' : String(r.runKm))}"
        data-row-pace="${escapeHtml(r.targetPace || '')}"
        data-row-lift="${escapeHtml(r.lift || '')}"
        data-row-notes="${escapeHtml(r.notes || '')}">
      <span class="pw-grip">⋮⋮</span>
      <span class="pw-day mono">${escapeHtml(r.day)}</span>
      <span class="pw-icon">${meta.emoji}</span>
      <div class="pw-text">
        <div class="pw-session">${escapeHtml(r.session || '')}</div>
        ${subline ? `<div class="pw-sub mono">${escapeHtml(subline)}</div>` : ''}
      </div>
      ${status ? `<span class="pw-badge status-${status.toLowerCase()}">${status === 'DONE' ? '✓' : status === 'SKIPPED' ? '⊘' : '↪'}</span>` : ''}
    </li>
  `;
}

function renderPlanDaily(planData) {

  const byWeek = new Map();

function bindPlanView() {

  if (back) back.addEventListener('click', () => { state.view = 'home'; render(); });

      render();
    });

  enableWeekSortable();
}

function enableWeekSortable() {
  if (typeof Sortable === 'undefined') {
    // Library not loaded yet — retry shortly.
    setTimeout(enableWeekSortable, 120);
    return;
  }
  document.querySelectorAll('[data-sortable-week]').forEach(ul => {
    if (ul._sortableAttached) return;
    ul._sortableAttached = true;
    Sortable.create(ul, {
      animation: 160,
      delay: 250,           // long-press delay on touch
      delayOnTouchOnly: true,
      handle: '.pw-grip',   // also accept drag from the grip handle
      draggable: '.pw-item',
      ghostClass: 'pw-ghost',
      chosenClass: 'pw-chosen',
      onEnd: function (evt) {
        if (evt.oldIndex === evt.newIndex) return;
        const week = ul.dataset.sortableWeek;
        const items = Array.from(ul.querySelectorAll('.pw-item'));
        const sessions = items.map(li => ({
          session: li.dataset.rowSession,
          runKm: li.dataset.rowRunkm === '' ? '' : parseFloat(li.dataset.rowRunkm),
          targetPace: li.dataset.rowPace,
          lift: li.dataset.rowLift,
          notes: li.dataset.rowNotes
        }));
        savePlanWeekOrder(week, sessions);
      }
    });
  });
}

async function savePlanWeekOrder(week, sessions) {
  toast('Saving new order…');
  try {
    await api('updatePlanWeek', { week: week, sessions: sessions });
    toast('Plan reordered', 'success');
    await loadData();
  } catch (err) {
    toast('Reorder failed: ' + err.message, 'error');
    await loadData(); // refresh so the view reflects the actual sheet
  }
}

// Map a plan row's "Session" to an emoji + how the Start button should behave.
function sessionMetaFromPlan(p) {
  const sess = (p.session || '').toLowerCase();
  const lift = (p.lift || '').toLowerCase();
  if (lift === 'push' || sess.indexOf('push') !== -1) {
    return { emoji: '🏋️‍♂️', tone: 'push', actionType: 'push' };
  }
  if (lift === 'pull' || sess.indexOf('pull') !== -1) {
    return { emoji: '💪', tone: 'pull', actionType: 'pull' };
  }
  if (lift === 'legs' || sess.indexOf('legs') !== -1 || sess.indexOf('leg') !== -1) {
    return { emoji: '🦿', tone: 'legs', actionType: 'legs' };
  }
  if (sess.indexOf('rest') !== -1) {
    return { emoji: '😴', tone: 'rest', actionType: null, restMessage: 'Rest day. Eat well, sleep more.' };
  }
  if (sess.indexOf('race') !== -1) {
    return { emoji: '🏁', tone: 'race', actionType: 'cardio', runType: 'long' };
  }
  if (sess.indexOf('long') !== -1) {
    return { emoji: '🏔️', tone: 'long', actionType: 'cardio', runType: 'long' };
  }
  if (sess.indexOf('interval') !== -1) {
    return { emoji: '⚡', tone: 'interval', actionType: 'cardio', runType: 'interval' };
  }
  if (sess.indexOf('hmp') !== -1 || sess.indexOf('tempo') !== -1 || sess.indexOf('tune-up') !== -1 || sess.indexOf('strides') !== -1) {
    return { emoji: '🔥', tone: 'tempo', actionType: 'cardio', runType: 'interval' };
  }
  if (sess.indexOf('easy') !== -1 || sess.indexOf('recovery') !== -1 || sess.indexOf('jog') !== -1 || sess.indexOf('shakeout') !== -1) {
    return { emoji: '🏃', tone: 'easy', actionType: 'cardio', runType: 'easy' };
  }
  // Unknown — show the icon but no action.
  return { emoji: '📋', tone: '', actionType: null, restMessage: 'No matching session type.' };
}

  const sessionDate = state.startDateIso
    ? (isoToMonthDay(state.startDateIso) || todayFormatted())
    : todayFormatted();

  if (type === 'cardio') {
    // Run log: pick interval/long/easy, then enter structured details.
    state.runLog = {
      phase: 'pickType', runType: null,
      // Common fields
      distance: '', acc: '', notes: '',
      // Non-interval pace
      pace: '',
      // Interval-only fields
      sets: '', highestPace: '', lowestPace: '',
      saving: false, date: sessionDate
    };
    state.view = 'runLog';
    render();
    return;
  }
  const typeName = { push: 'Push', pull: 'Pull', legs: 'Legs', cardio: 'Cardio' }[type];
  state.session = {
    type: typeName,
    typeKey: type,
    date: sessionDate,
    entries: [],
    lastExercise: null
  };
  state.view = 'session';
  render();
  openExercisePicker(type, null);
}

// ---- run helpers ----
// "M.SS" or "M:SS" or just "M" → seconds. Returns null if unparseable.
function parsePaceToSec(p) {
  if (p == null) return null;
  const s = String(p).trim();
  if (!s) return null;
  const m = s.match(/^(\d+)(?:[.:](\d{1,2}))?$/);
  if (!m) return null;
  const min = parseInt(m[1], 10);
  const sec = parseInt(m[2] || '0', 10);
  if (isNaN(min) || isNaN(sec)) return null;
  return min * 60 + sec;
}
function paceSecToString(totalSec) {
  if (totalSec == null || isNaN(totalSec) || totalSec < 0) return '';
  const min = Math.floor(totalSec / 60);
  const sec = Math.round(totalSec - min * 60);
  return min + '.' + String(sec).padStart(2, '0');
}
function computeAvgPace(high, low) {
  const a = parsePaceToSec(high);
  const b = parsePaceToSec(low);
  if (a == null && b == null) return '';
  if (a == null) return paceSecToString(b);
  if (b == null) return paceSecToString(a);
  return paceSecToString(Math.round((a + b) / 2));
}

// Auto-classify a run into one or more training-effect tags so the user gets
// quick feedback on what the workout developed. Heuristic, not a substitute
// for HR-zone training, but reasonable for pace-based logging.
function classifyRunEffects(r) {
  if (!r) return [];
  const effects = [];
  const distanceK = parseFloat(r.distance) || 0;

  if (r.runType === 'interval') {
    const fastSec = parsePaceToSec(r.highestPace);
    if (fastSec == null) {
      effects.push({ name: 'Speed work', tone: 'speed' });
    } else if (fastSec < 4.5 * 60) {
      effects.push({ name: 'Anaerobic', tone: 'speed' });
      effects.push({ name: 'VO2 max', tone: 'vo2' });
    } else if (fastSec < 5.5 * 60) {
      effects.push({ name: 'VO2 max', tone: 'vo2' });
    } else {
      effects.push({ name: 'Tempo', tone: 'tempo' });
    }
  } else if (r.runType === 'long' || distanceK >= 10) {
    effects.push({ name: 'Endurance', tone: 'endurance' });
    const avgSec = parsePaceToSec(r.pace);
    if (avgSec != null && avgSec < 6 * 60) effects.push({ name: 'Lactate threshold', tone: 'tempo' });
    else effects.push({ name: 'Aerobic base', tone: 'base' });
  } else if (r.runType === 'easy') {
    const avgSec = parsePaceToSec(r.pace);
    if (avgSec != null && avgSec >= 7.5 * 60) effects.push({ name: 'Recovery', tone: 'recovery' });
    else effects.push({ name: 'Aerobic base', tone: 'base' });
  } else {
    effects.push({ name: 'Tempo', tone: 'tempo' });
  }
  return effects;
}

function renderRunEffectChips(effects) {
  if (!effects || effects.length === 0) return '';
  return `
    <div class="effects-row">
      <span class="rp-label">Trains</span>
      <div class="effects-chips">
        ${effects.map(e => `<span class="effect-chip tone-${e.tone}">${escapeHtml(e.name)}</span>`).join('')}
      </div>
    </div>
  `;
}

// Build the sets-string for a run from the structured fields. Returns ''
// when nothing meaningful is filled in (which is what blocks Save).
function composeRunSetsString(label, r) {
  const isInterval = r && r.runType === 'interval';
  const acc = (r && r.acc ? String(r.acc) : '').trim();
  const notes = (r && r.notes ? String(r.notes) : '').trim();
  const effects = classifyRunEffects(r);
  const effectTag = effects.length ? ' (' + effects.map(e => e.name).join(', ') + ')' : '';

  let body;
  if (isInterval) {
    const distance = (r.distance || '').trim();
    if (!distance) return '';
    const sets = (r.sets || '').trim();
    const high = (r.highestPace || '').trim();
    const low = (r.lowestPace || '').trim();
    const avg = computeAvgPace(high, low);
    body = distance + 'k';
    if (sets) body += ' × ' + sets + ' sets';
    if (high && low) body += ', @' + high + '-' + low;
    else if (high) body += ', @' + high;
    else if (low) body += ', @' + low;
    if (avg && high && low) body += ' (avg ' + avg + ')';
    if (acc) body += ', acc. ' + acc + 'k';
  } else {
    const distance = (r.distance || '').trim();
    if (!distance) return '';
    const pace = (r.pace || '').trim();
    body = distance + 'k';
    if (pace) body += ' @' + pace;
    if (acc) body += ', acc. ' + acc + 'k';
  }
  if (notes) body += ' · ' + notes;
  return label + ' · ' + body + effectTag;
}

  document.querySelectorAll('[data-run-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.runLog.runType = btn.dataset.runType;
      state.runLog.phase = 'entry';
      render();
      // Autofocus the distance field — first thing the user enters.
      setTimeout(() => {
        const el = document.getElementById('runDistIn');
        if (el) el.focus();
      }, 50);
    });
  });

  // Wire each structured field. Updates state in place + refreshes the
  // preview line, average pace (interval mode), and effect chips — no full
  // re-render so the keyboard / focus stays put.
  const refreshDerived = () => {
    const r = state.runLog;
    const rt = RUN_TYPES.find(t => t.id === r.runType);
    const label = rt ? rt.label : 'Run';
    const previewEl = document.getElementById('runPreview');
    if (previewEl) previewEl.textContent = composeRunSetsString(label, r) || '—';
    const avgEl = document.getElementById('runAvgPace');
    if (avgEl) avgEl.textContent = computeAvgPace(r.highestPace, r.lowestPace) || '—';
    const effectsEl = document.getElementById('runEffects');
    if (effectsEl) effectsEl.innerHTML = renderRunEffectChips(classifyRunEffects(r));
  };

  const bindField = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', e => { state.runLog[key] = e.target.value; refreshDerived(); });
  };
  bindField('runDistIn', 'distance');
  bindField('runPaceIn', 'pace');
  bindField('runAccIn', 'acc');
  bindField('runNotesIn', 'notes');
  bindField('runSetsIn', 'sets');
  bindField('runHighIn', 'highestPace');
  bindField('runLowIn', 'lowestPace');

  const saveBtn = document.getElementById('saveRunBtn');
  if (saveBtn) saveBtn.addEventListener('click', saveRunLog);
}

async function saveRunLog() {
  const r = state.runLog;
  if (!r || !r.runType) { toast('Pick a run type first', 'error'); return; }
  if (!(r.distance || '').trim()) {
    toast(r.runType === 'interval' ? 'Enter total distance' : 'Enter run distance', 'error');
    return;
  }

  const rt = RUN_TYPES.find(t => t.id === r.runType);
  const label = rt ? rt.label : 'Run';
  const setsString = composeRunSetsString(label, r);
  if (!setsString) { toast('Enter run distance', 'error'); return; }

  r.saving = true; render();
  const runDate = r.date || todayFormatted();
  try {
    const res = await api('addSession', {
      date: runDate,
      sessionType: 'Cardio',
      entries: [{ exercise: 'Run', sets: setsString, notes: '' }]
    });
    toast('Run saved to ' + (res && res.tab ? '"' + res.tab + '"' : 'sheet'), 'success');
    state.runLog = null;
    state.view = 'home';
    await loadData();
    await autoMarkPlanDone(runDate, 'cardio');
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
    r.saving = false;
    render();
  }
}

// "April 22" -> "2026-04-22" (using parseSheetDate for the year inference).
function monthDayToIso(md) {
  const d = parseSheetDate(md);
  return d ? localDateKey(d) : '';
}
// "2026-04-22" -> "April 22" (matches todayFormatted's style).
function isoToMonthDay(iso) {
  if (!iso) return '';
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return '';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthIdx = parseInt(m[2], 10) - 1;
  const day = parseInt(m[3], 10);
  if (monthIdx < 0 || monthIdx > 11 || isNaN(day)) return '';
  return months[monthIdx] + ' ' + day;
}
function todayIso() { return localDateKey(new Date()); }

function renderSetInput(a, setNum) {

  if (exMeta && exMeta.history && exMeta.history[0]) {
    const parsed = parseFirstSetHint(exMeta.history[0].sets, editPhase === 'warmup');
    if (parsed) { suggestW = parsed.weight; suggestR = parsed.reps; }
  }
  const prevInPhase = editPhase === 'warmup'
    ? a.warmupSets[a.warmupSets.length - 1]
    : a.workingSets[a.workingSets.length - 1];
  if (prevInPhase && !editing) { suggestW = prevInPhase.weight; suggestR = prevInPhase.reps; }
  const currentW = a.current.weight !== '' ? a.current.weight : suggestW;
  const currentR = a.current.reps !== '' ? a.current.reps : suggestR;
  const currentNote = a.current.note || '';

  const phaseLabel = editPhase === 'warmup' ? 'Warmup Set' : 'Working Set';
  const headerLabel = editing ? `Editing ${phaseLabel}` : phaseLabel;
  const numLabel = editing ? `Set #${editIdx + 1}` : `Set #${setNum}`;

  return `
    <div class="set-input ${editPhase}${editing ? ' editing-mode' : ''}">

        </div>
        <div>
          <label class="label">Reps</label>
          <input id="rIn" type="text" inputmode="numeric" placeholder="reps"

        </div>

      <div class="steppers">
        <div class="stepper-group">
          <button data-w-adj="-2.5">−2.5</button>
          <button data-w-adj="-0.5">−0.5</button>
          <button data-w-adj="0.5">+0.5</button>
          <button data-w-adj="2.5">+2.5</button>
        </div>
        <div class="stepper-group">
          <button data-r-adj="-1">−1</button>
          <button data-r-adj="1">+1</button>
        </div>

}

function parseFirstSetHint(str, preferWarmup) {
  if (!str) return null;
  // Strip any per-set notes in parens so "16x8 (ds 14x6)" parses cleanly.
  const cleaned = str.replace(/\([^)]*\)/g, '').trim();
  const parts = cleaned.split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return null;
  const p = preferWarmup ? parts[0] : parts[parts.length - 1];
  let raw = p.replace(/^W:/i, '').trim();
  const norm = raw.replace(/\s*x\s*/gi, 'x');
  const tokens = norm.split('x');
  if (tokens.length < 2) return null;
  let weight = tokens[0], reps = parseInt(tokens[1], 10);
  if (weight === '' && tokens[0] === '') weight = 'BW';
  if (isNaN(reps)) return null;
  if (/bw/i.test(weight)) weight = '';
  if (/bar/i.test(weight)) weight = '';
  return { weight: weight, reps: reps };
}

function renderTimer(a) {
  const t = a.timer;
  const total = t.total, remaining = t.remaining;
  const isOver = remaining < 0;
  const pct = isOver ? 0 : Math.max(0, (remaining / total) * 100);
  return `
    <div class="timer-card ${isOver ? 'overtime' : ''}">
      <div class="t-label">${isOver ? 'Rest Overtime' : 'Resting'}</div>
      <div class="t-display ${remaining <= 10 && remaining >= 0 ? 'pulse' : ''}">
        ${isOver ? '+' : ''}${formatTime(Math.abs(remaining))}
      </div>
      <div class="t-suggest">Suggested: ${formatTime(total)} · ${isCompound(a.name) ? 'Compound' : 'Isolation'}</div>
      <div class="t-actions">
        <button class="btn" id="addTimeBtn">+30s</button>
        <button class="btn" id="resetTimerBtn">Reset</button>
        <button class="btn btn-primary" id="nextSetBtn">Start Next Set</button>
      </div>
      <div class="t-progress" style="width: ${pct}%;"></div>
    </div>
  `;
}

function bindExercise() {
  const a = state.active;
  document.getElementById('backBtn').addEventListener('click', () => {
    if (a.workingSets.length > 0 || a.warmupSets.length > 0) {
      if (!confirm('Discard this exercise?')) return;
    }
    state.active = null;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.view = 'session';
    render();
  });
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  bindMuscleToggle();

  document.querySelectorAll('[data-phase]').forEach(btn => {
    btn.addEventListener('click', () => {
      a.phase = btn.dataset.phase;
      a.current = { weight: '', reps: '', note: '' };
      render();
    });
  });

  const wIn = document.getElementById('wIn');
  const rIn = document.getElementById('rIn');
  const nIn = document.getElementById('nIn');
  if (wIn) wIn.addEventListener('input', e => { a.current.weight = e.target.value; });
  if (rIn) rIn.addEventListener('input', e => { a.current.reps = e.target.value; });
  if (nIn) nIn.addEventListener('input', e => { a.current.note = e.target.value; });
  document.querySelectorAll('[data-w-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseFloat(btn.dataset.wAdj);
      const cur = parseFloat(wIn.value);
      const next = isNaN(cur) ? delta : Math.max(0, Math.round((cur + delta) * 10) / 10);
      wIn.value = next;
      a.current.weight = String(next);
    });
  });
  document.querySelectorAll('[data-r-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.rAdj, 10);
      const cur = parseInt(rIn.value, 10);
      const next = isNaN(cur) ? Math.max(0, delta) : Math.max(0, cur + delta);
      rIn.value = next;
      a.current.reps = String(next);
    });
  });

  const finishSetBtn = document.getElementById('finishSetBtn');
  if (finishSetBtn) finishSetBtn.addEventListener('click', finishSet);

  const resumeRestBtn = document.getElementById('resumeRestBtn');
  if (resumeRestBtn) resumeRestBtn.addEventListener('click', () => {
    // Re-arm the timer for the previous set — used when the user accidentally
    // tapped "Start Next Set" and wants the rest period back.
    startTimer(a.restSec);
    render();
  });

  document.querySelectorAll('[data-rmset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [kind, idx] = btn.dataset.rmset.split(':');
      const arr = kind === 'warmup' ? a.warmupSets : a.workingSets;
      arr.splice(+idx, 1);
      // If we removed the set being edited, drop edit mode.
      if (a.editingSet && a.editingSet.kind === kind && a.editingSet.idx === +idx) {
        a.editingSet = null;
        a.current = { weight: '', reps: '', note: '' };
      }
      render();
    });
  });

  document.querySelectorAll('[data-editset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [kind, idxStr] = btn.dataset.editset.split(':');
      const idx = +idxStr;
      const arr = kind === 'warmup' ? a.warmupSets : a.workingSets;
      const target = arr[idx];
      if (!target) return;
      // Pause the rest timer (if running) so the input is visible. The user
      // can hit "Resume rest" after saving if they want it back.
      if (state.timer) { clearInterval(state.timer); state.timer = null; }
      a.timer = null;
      a.editingSet = { kind, idx };
      a.current = {
        weight: target.weight === '' ? '' : String(target.weight),
        reps: String(target.reps),
        note: target.note || ''
      };
      a.phase = kind;
      render();
    });
  });

  const cancelEdit = document.getElementById('cancelEditBtn');
  if (cancelEdit) cancelEdit.addEventListener('click', () => {
    a.editingSet = null;
    a.current = { weight: '', reps: '', note: '' };
    render();
  });
  const saveEdit = document.getElementById('saveEditBtn');
  if (saveEdit) saveEdit.addEventListener('click', () => {
    const wIn = document.getElementById('wIn');
    const rIn = document.getElementById('rIn');
    const nIn = document.getElementById('nIn');
    let weight = (wIn.value || '').trim();
    const reps = parseInt(rIn.value, 10);
    const note = (nIn && nIn.value ? nIn.value : '').trim();
    if (!reps || reps <= 0) { toast('Enter reps', 'error'); return; }
    if (/^(bw|bodyweight)$/i.test(weight)) weight = '';
    const { kind, idx } = a.editingSet;
    const arr = kind === 'warmup' ? a.warmupSets : a.workingSets;
    const orig = arr[idx];
    if (!orig) { a.editingSet = null; render(); return; }
    arr[idx] = { ...orig, weight, reps };
    if (note) arr[idx].note = note; else delete arr[idx].note;
    a.editingSet = null;
    a.current = { weight: '', reps: '', note: '' };
    toast('Set updated', 'success');
    render();
  });

  const addTime = document.getElementById('addTimeBtn');
  if (addTime) addTime.addEventListener('click', () => {
    a.timer.total += 30;
    a.timer.remaining += 30;
    a.timer.startedAt = Date.now() - (a.timer.total - a.timer.remaining) * 1000;
    a.timer.alerted = false;
    render();
  });
  const resetTimerBtn = document.getElementById('resetTimerBtn');
  if (resetTimerBtn) resetTimerBtn.addEventListener('click', () => {
    // Restart the rest period from scratch — used when the user accidentally
    // pumped +30s, or when they want to take longer than originally planned.
    a.timer.total = a.restSec;
    a.timer.remaining = a.restSec;
    a.timer.startedAt = Date.now();
    a.timer.alerted = false;
    render();
  });
  const nextSet = document.getElementById('nextSetBtn');
  if (nextSet) nextSet.addEventListener('click', () => { stopTimer(); render(); });

  const finEx = document.getElementById('finishExBtn');
  if (finEx) finEx.addEventListener('click', finishExercise);
}

function finishSet() {
  const a = state.active;
  const wIn = document.getElementById('wIn');
  const rIn = document.getElementById('rIn');
  const nIn = document.getElementById('nIn');
  let weight = (wIn.value || '').trim();
  const reps = parseInt(rIn.value, 10);
  const note = (nIn && nIn.value ? nIn.value : '').trim();
  if (!reps || reps <= 0) { toast('Enter reps', 'error'); return; }
  if (/^(bw|bodyweight)$/i.test(weight)) weight = '';
  const entry = { weight: weight, reps: reps };
  if (note) entry.note = note;
  if (a.phase === 'warmup') a.warmupSets.push(entry); else a.workingSets.push(entry);
  a.current = { weight: '', reps: '', note: '' };
  startTimer(a.restSec);
  render();
}

function startTimer(sec) {
  const a = state.active;
  a.timer = { total: sec, remaining: sec, startedAt: Date.now() };
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(tickTimer, 250);
  // Best-effort: ask for notification permission the first time a timer
  // starts. If the user denies, we just rely on vibrate + beep (existing).
  ensureNotificationPermission();
}

function tickTimer() {
  const a = state.active;
  if (!a || !a.timer) return;
  const elapsed = (Date.now() - a.timer.startedAt) / 1000;
  a.timer.remaining = a.timer.total - elapsed;
  const card = document.querySelector('.timer-card');
  if (!card) return;
  const disp = card.querySelector('.t-display');
  const prog = card.querySelector('.t-progress');
  const isOver = a.timer.remaining < 0;
  if (disp) {
    disp.textContent = (isOver ? '+' : '') + formatTime(Math.abs(a.timer.remaining));
    disp.classList.toggle('pulse', a.timer.remaining <= 10 && a.timer.remaining >= 0);
  }
  if (prog) {
    prog.style.width = isOver ? '0%' : Math.max(0, (a.timer.remaining / a.timer.total) * 100) + '%';
  }
  card.classList.toggle('overtime', isOver);
  const label = card.querySelector('.t-label');
  if (label) label.textContent = isOver ? 'Rest Overtime' : 'Resting';
  if (!a.timer.alerted && a.timer.remaining <= 0) {
    a.timer.alerted = true;
    try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
    try { beep(); } catch (e) {}
    showRestDoneNotification(a);
  }
}

function stopTimer() {
  const a = state.active;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  const arr = a.phase === 'warmup' ? a.warmupSets : a.workingSets;
  const last = arr[arr.length - 1];
  if (last && a.timer) {
    last.restAfter = Math.max(0, a.timer.total - a.timer.remaining);
  }
  a.timer = null;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.value = 0.1;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); ctx.close(); }, 220);
  } catch (e) {}
}

function finishExercise() {
  const a = state.active;
  if (a.workingSets.length === 0) { toast('Log at least one working set', 'error'); return; }
  const setsString = formatExerciseSets(a.warmupSets, a.workingSets);
  // Per-set notes are embedded inside setsString (e.g. "16x8 (ds 14x6)").
  // Exercise-level notes field kept empty for backend compatibility.
  state.session.entries.push({
    exercise: a.name,
    sets: setsString,
    notes: ''
  });
  state.session.lastExercise = a.name;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.active = null;
  state.view = 'session';
  toast('Saved ' + a.name, 'success');
  render();
}

function bindPicker() {

    state.picker.open = false;
    state.picker.query = '';
    const el = document.getElementById('pickerBackdrop');

}

// (Re)bind the click handlers for picker rows + the "Add new" custom row.
// Called after the list is rebuilt so newly-rendered items work.
function bindPickerItems() {
  const close = () => {
    state.picker.open = false;
    state.picker.query = '';
    const el = document.getElementById('pickerBackdrop');
    if (el) el.remove();
  };
  document.querySelectorAll('[data-pick]').forEach(btn => {

function refreshPickerList() {
  const p = state.picker;
  if (!p) return;
  const exclude = state.session ? state.session.entries.map(e => e.exercise) : [];
  let list = rankExercises(p.forType, exclude, p.afterExercise);
  if (p.query) {
    const q = p.query.toLowerCase();

  }

  if (!el) return;
  el.innerHTML = renderPickerList(list, p.query, customAvail);

}

// ============================================================
// PROGRESS (exercise list)
// ============================================================
// ============================================================
// RUNNING TRACKER
// ============================================================
// Parse a "Run" set string. Handles several formats:
//   "3k @7.32, acc. 5.51k"
//   "Interval 3k @6.30, acc. 6.2k"
//   "Easy run 5k @7:30"                       (no acc, colon pace)
//   "Interval · 1 run - 2 jog, 3k @ pace 5 - 9"  (pace range + word "pace")
//   "10k"                                      (bare distance, no pace)
// Returns null if no distance is found.
function parseRun(setsStr) {
  if (!setsStr) return null;
  const s = String(setsStr);

  // Peel off the "acc." portion first so it doesn't get confused with the run
  // distance when searching for the first Xk token.
  const accMatch = s.match(/acc\.?\s*(\d+(?:\.\d+)?)\s*k(?:m)?\b/i);
  const accKmRaw = accMatch ? parseFloat(accMatch[1]) : null;
  const rest = accMatch ? s.replace(accMatch[0], ' ') : s;

  // First Xk (or Xkm) in the remaining string is the run distance.
  const distMatch = rest.match(/(\d+(?:\.\d+)?)\s*k(?:m)?\b/i);
  if (!distMatch) return null;
  const runKm = parseFloat(distMatch[1]);

  // Pace. Optional. Accepts:
  //   "@7.32"  "@7:32"  "@ pace 7.32"  "@ pace 5 - 9"  "@5-9"
  // For ranges, use the midpoint so one "representative" pace can be shown.
  let paceMin = 0, paceSec = 0;
  const paceMatch = rest.match(
    /@\s*(?:pace\s+)?(\d+)(?:[.:](\d{1,2}))?(?:\s*-\s*(\d+)(?:[.:](\d{1,2}))?)?/i
  );
  if (paceMatch) {
    const m1 = parseInt(paceMatch[1], 10) || 0;
    const s1 = parseInt(paceMatch[2] || '0', 10) || 0;
    if (paceMatch[3]) {
      const m2 = parseInt(paceMatch[3], 10) || 0;
      const s2 = parseInt(paceMatch[4] || '0', 10) || 0;
      const midSec = Math.round(((m1 * 60 + s1) + (m2 * 60 + s2)) / 2);
      paceMin = Math.floor(midSec / 60);
      paceSec = midSec % 60;
    } else {
      paceMin = m1;
      paceSec = s1;
    }
  }

  // Optional training tag anywhere in the original string.
  const typeMatch = s.match(/\b(interval|long[\s-]*run|easy[\s-]*run|tempo|fartlek|recovery)\b/i);
  const runType = typeMatch ? typeMatch[0].toLowerCase().replace(/\s+/g, ' ') : null;

  return {
    runKm: isNaN(runKm) ? 0 : runKm,
    accKm: accKmRaw !== null && !isNaN(accKmRaw) ? accKmRaw : runKm,
    paceMin: paceMin,
    paceSec: paceSec,
    runType: runType
  };
}

// Pull every parseable Run entry out of the active-block sessions.
function getAllRuns() {
  const sessions = groupedSheet8Sessions();
  const runs = [];
  for (const s of sessions) {
    for (const e of s.exercises) {
      if (!/^\s*run\s*$/i.test(e.name)) continue;
      const parsed = parseRun(e.sets);
      if (!parsed) continue;
      runs.push({
        runKm: parsed.runKm,
        accKm: parsed.accKm,
        paceMin: parsed.paceMin,
        paceSec: parsed.paceSec,
        runType: parsed.runType,
        date: s.dateObj,
        dateLabel: s.dateLabel
      });
    }
  }
  runs.sort((a, b) => a.date - b.date);
  return runs;
}

// Monday 00:00 local time for the week containing d.
function mondayOfWeek(d) {
  const dt = new Date(d);
  dt.setHours(0, 0, 0, 0);
  const dayIdx = (dt.getDay() + 6) % 7; // Mon=0
  dt.setDate(dt.getDate() - dayIdx);
  return dt;
}

// Returns 7 cumulative values [Mon, Tue, ..., Sun] of `metric` ('acc' | 'run')
// for the week starting at `mondayDate`.
function weekCumulative(runs, mondayDate, metric) {
  const perDay = [0, 0, 0, 0, 0, 0, 0];
  const monday = mondayOfWeek(mondayDate);
  const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 7);
  for (const r of runs) {
    if (r.date < monday || r.date >= sunday) continue;
    const dayIdx = (r.date.getDay() + 6) % 7;
    perDay[dayIdx] += (metric === 'run') ? r.runKm : r.accKm;
  }
  let running = 0;
  return perDay.map(v => (running += v));
}

// All weeks in the active block, sorted oldest-first.
function runsByWeek(metric) {
  const runs = getAllRuns();
  if (runs.length === 0) return [];
  const byMon = new Map();
  for (const r of runs) {
    const mon = mondayOfWeek(r.date).getTime();
    if (!byMon.has(mon)) byMon.set(mon, { monday: new Date(mon), runs: [], totalAcc: 0, totalRun: 0 });
    const b = byMon.get(mon);
    b.runs.push(r);
    b.totalAcc += r.accKm;
    b.totalRun += r.runKm;
  }
  const weeks = Array.from(byMon.values()).sort((a, b) => a.monday - b.monday);
  weeks.forEach(w => { w.total = metric === 'run' ? w.totalRun : w.totalAcc; });
  return weeks;
}

function renderRunning() {
  const metric = state.runningMetric || 'acc';
  const runs = getAllRuns();
  if (runs.length === 0) {
    return `
      <div class="running-section">
        <div class="section-title"><h3>Running</h3></div>
        <div class="empty-state">No runs logged yet. Log a run with sets like <span class="mono">3k @7.32, acc. 5.51k</span> and it'll appear here.</div>
      </div>
    `;
  }

  const now = new Date();
  const mondayThis = mondayOfWeek(now);
  const mondayLast = new Date(mondayThis); mondayLast.setDate(mondayLast.getDate() - 7);
  const thisCum = weekCumulative(runs, mondayThis, metric);
  const lastCum = weekCumulative(runs, mondayLast, metric);
  const thisTotal = thisCum[6] || 0;
  const lastTotal = lastCum[6] || 0;
  const delta = thisTotal - lastTotal;
  const deltaStr = (delta >= 0 ? '+' : '') + delta.toFixed(2) + 'km vs last';

  return `
    <div class="running-section">
      <div class="section-title">
        <h3>Running</h3>
        <div class="run-metric-toggle">
          <button class="${metric === 'acc' ? 'on' : ''}" data-run-metric="acc">Acc</button>
          <button class="${metric === 'run' ? 'on' : ''}" data-run-metric="run">Run</button>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">This week</div>
          <div class="stat-value mono">${thisTotal.toFixed(2)}<span class="stat-unit">km</span></div>
          <div class="stat-sub ${delta >= 0 ? 'positive' : 'negative'}">${escapeHtml(deltaStr)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last week</div>
          <div class="stat-value mono">${lastTotal.toFixed(2)}<span class="stat-unit">km</span></div>
          <div class="stat-sub">${runs.length} run${runs.length !== 1 ? 's' : ''} total</div>
        </div>
      </div>

      ${renderRunningChart(thisCum, lastCum)}
    </div>
  `;
}

function renderRunningChart(thisCum, lastCum) {
  const W = 560, H = 220;
  const padL = 38, padR = 16, padT = 14, padB = 30;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const maxY = Math.max(1, ...thisCum, ...lastCum);
  // Nice round max: snap up to the next 1 / 5 / 10 / 20 depending on scale.
  const step = maxY <= 4 ? 1 : maxY <= 20 ? 5 : maxY <= 50 ? 10 : 20;
  const niceMax = Math.ceil(maxY / step) * step;
  const x = (i) => padL + (i / 6) * plotW;
  const y = (v) => padT + plotH - (v / niceMax) * plotH;
  const pathFor = (arr) => arr.map((v, i) => (i === 0 ? 'M' : 'L') + ' ' + x(i).toFixed(1) + ' ' + y(v).toFixed(1)).join(' ');
  const dayLabels = ['M','T','W','T','F','S','S'];
  const gridLevels = [0, 0.5, 1];

  return `
    <div class="chart-box">
      <div class="cb-head">
        <div class="cb-label">Cumulative km · Mon\u2013Sun</div>
        <div class="run-legend">
          <span class="legend-swatch this"></span> This week
          <span class="legend-swatch last"></span> Last
        </div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" class="run-chart" preserveAspectRatio="xMidYMid meet">
        ${gridLevels.map(f => {
          const gy = padT + plotH - f * plotH;
          return '<line class="grid" x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + gy.toFixed(1) + '"/>';
        }).join('')}
        ${gridLevels.map(f => {
          const gy = padT + plotH - f * plotH;
          const lv = (niceMax * f);
          const label = Number.isInteger(lv) ? String(lv) : lv.toFixed(1);
          return '<text class="axis-label" x="' + (padL - 6) + '" y="' + (gy + 3).toFixed(1) + '" text-anchor="end">' + label + '</text>';
        }).join('')}
        ${dayLabels.map((d, i) => '<text class="axis-label" x="' + x(i).toFixed(1) + '" y="' + (H - 10) + '" text-anchor="middle">' + d + '</text>').join('')}
        <path class="line-last" d="${pathFor(lastCum)}"/>
        ${lastCum.map((v, i) => '<circle class="pt-last" cx="' + x(i).toFixed(1) + '" cy="' + y(v).toFixed(1) + '" r="2.5"/>').join('')}
        <path class="line-this" d="${pathFor(thisCum)}"/>
        ${thisCum.map((v, i) => '<circle class="pt-this" cx="' + x(i).toFixed(1) + '" cy="' + y(v).toFixed(1) + '" r="3.5"/>').join('')}
      </svg>
    </div>
  `;
}

// Just the list portion of the exercise browser. Extracted so the search
// handler can re-render only the list (rather than the entire app), which
// avoids the full-DOM-replace flicker that was making the input "twitch".
function renderExBrowseList(list, typeLabel) {
  if (list.length === 0) {
    return `<div class="empty-state">No ${escapeHtml(typeLabel.toLowerCase())} exercises logged yet.</div>`;
  }
  return list.map(({ ex, hist, sessionCount }) => {
    const latest = hist[hist.length - 1];
    const latestMetric = latest && latest.metrics
      ? latest.metrics.est1RM + 'kg est.'
      : (latest && latest.cardio ? 'cardio' : '—');
    return `
      <button class="eb-item" data-exdetail="${escapeHtml(ex.name)}">
        <div style="flex:1; min-width:0;">
          <div class="eb-name">${escapeHtml(ex.name)}</div>
          <div class="eb-meta">${sessionCount} session${sessionCount !== 1 ? 's' : ''} · latest: ${escapeHtml(latestMetric)}</div>
        </div>
        <span style="color: var(--text-faint); font-size: 18px;">›</span>
      </button>
    `;
  }).join('');
}

// Recompute the filtered list and patch only #ebList — preserves search-input
// focus, caret position, and IME composition.
function refreshExBrowseList() {
  const d = state.data || { exercises: [] };
  const type = state.progress.typeFilter || 'push';
  const q = (state.progress.query || '').toLowerCase();
  const list = d.exercises
    .map(e => {
      const hist = fullHistoryFor(e.name);
      return { ex: e, hist, sessionCount: hist.length, exType: classifyExercise(e.name) };
    })
    .filter(item => item.sessionCount > 0 && item.exType === type)
    .filter(item => !q || item.ex.name.toLowerCase().includes(q))
    .sort((a, b) => b.sessionCount - a.sessionCount);
  const typeLabel = { push: 'Push', pull: 'Pull', legs: 'Legs' }[type] || 'Push';
  const el = document.getElementById('ebList');
  if (!el) return;
  el.innerHTML = renderExBrowseList(list, typeLabel);
  bindExBrowseItems();
}

function bindExBrowseItems() {
  document.querySelectorAll('[data-exdetail]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.selectedExercise = btn.dataset.exdetail;
      state.view = 'exDetail';
      render();
    });
  });
}

function bindProgress() {
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  bindRunning();
  document.querySelectorAll('[data-prog-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.typeFilter = btn.dataset.progType;
      render();
    });
  });
  const search = document.getElementById('progSearch');
  if (search) {
    search.addEventListener('input', e => {
      state.progress.query = e.target.value;
      // Patch only the list — leaves the input element (and its focus/caret)
      // untouched so typing feels smooth.
      refreshExBrowseList();
    });
  }
  bindExBrowseItems();
}

// ============================================================
// EXERCISE DETAIL (graph)
// ============================================================
function renderExDetail() {
  const name = state.progress.selectedExercise;
  if (!name) { state.view = 'progress'; return ''; }
  const hist = fullHistoryFor(name);
  const muscles = musclesFor(name);
  const metric = state.progress.metric; // '1rm' | 'top' | 'volume'

  // Extract points
  const points = hist.filter(h => h.metrics).map(h => ({
    date: h.dateObj,
    dateLabel: h.date,
    value: metric === '1rm' ? h.metrics.est1RM : (metric === 'top' ? h.metrics.topSet : h.metrics.volume),
    sets: h.sets,
    rawSets: h.parsed
  }));

  const first = points[0];
  const last = points[points.length - 1];
  const delta = (first && last) ? (last.value - first.value) : 0;
  const deltaPct = (first && first.value) ? (delta / first.value) * 100 : 0;
  const unit = metric === 'volume' ? 'kg·reps' : 'kg';
  const metricLabel = metric === '1rm' ? 'Est. 1RM (Epley)' : (metric === 'top' ? 'Top Set Weight' : 'Total Volume');

  return `
    <div class="ex-hero">
      <div class="ex-kicker">Progress</div>
      <div class="ex-title">${escapeHtml(name)}</div>
    </div>

    ${renderMuscleBox(muscles, { label: 'Muscles worked' })}

    <div class="chart-box">
      <div class="metric-toggle">
        <button class="${metric === '1rm' ? 'on' : ''}" data-metric="1rm">Est. 1RM</button>
        <button class="${metric === 'top' ? 'on' : ''}" data-metric="top">Top Set</button>
        <button class="${metric === 'volume' ? 'on' : ''}" data-metric="volume">Volume</button>
      </div>
      <div class="cb-head">
        <div>
          <div class="cb-label">${escapeHtml(metricLabel)}</div>
          <div class="cb-value">
            ${last ? formatNum(last.value) : '—'}<span class="cb-unit">${last ? unit : ''}</span>
          </div>
          ${first && last && first !== last ? `
            <div class="cb-delta ${delta > 0 ? 'up' : (delta < 0 ? 'down' : '')}">
              ${delta > 0 ? '+' : ''}${formatNum(delta)}${unit} (${delta > 0 ? '+' : ''}${deltaPct.toFixed(1)}%) since ${escapeHtml(first.dateLabel)}
            </div>
          ` : `<div class="cb-delta">First data point</div>`}
        </div>
      </div>
      ${points.length >= 2
        ? renderChart(points)
        : `<div class="empty-state">Need at least 2 sessions to plot progress.</div>`
      }
    </div>

    <div class="section-title">
      <h3>History</h3>
      <span class="meta">${hist.length} session${hist.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="hist-table">
      ${hist.length === 0
        ? `<div class="empty-state">No history yet.</div>`
        : hist.slice().reverse().map(h => `
          <div class="hist-row">
            <span class="h-date">${escapeHtml(h.date)}</span>
            <span class="h-sets">${escapeHtml(h.sets)}</span>
            <span class="h-1rm">${h.metrics ? formatNum(h.metrics.est1RM) + 'kg' : (h.cardio ? 'cardio' : '—')}</span>
          </div>
        `).join('')
      }
    </div>
  `;
}

function formatNum(n) {
  if (typeof n !== 'number') return String(n);
  if (n >= 1000) return Math.round(n).toLocaleString();
  return (Math.round(n * 10) / 10).toString();
}

function renderChart(points) {
  const W = 500, H = 220, padL = 34, padR = 12, padT = 16, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const xs = points.map(p => p.date.getTime());
  const ys = points.map(p => p.value);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = 0, yMax = Math.max(...ys) * 1.1 || 1;
  const xScale = t => padL + (xMax === xMin ? innerW / 2 : ((t - xMin) / (xMax - xMin)) * innerW);
  const yScale = v => padT + innerH - (v / yMax) * innerH;

  // Line path
  const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.date.getTime()).toFixed(1)},${yScale(p.value).toFixed(1)}`).join(' ');
  // Area path (fill under line)
  const area = d + ` L${xScale(xMax).toFixed(1)},${padT + innerH} L${xScale(xMin).toFixed(1)},${padT + innerH} Z`;

  // Y-axis labels (4 ticks)
  const yTicks = [];
  const tickCount = 4;
  for (let i = 0; i <= tickCount; i++) {
    const v = (yMax * i) / tickCount;
    yTicks.push({ v, y: yScale(v) });
  }

  // X-axis labels: first, last, and maybe 1-2 in between if wide enough
  const xLabels = [{ p: points[0], x: xScale(points[0].date.getTime()) }];
  if (points.length >= 3) {
    const mid = points[Math.floor(points.length / 2)];
    xLabels.push({ p: mid, x: xScale(mid.date.getTime()) });
  }
  if (points.length >= 2) {
    xLabels.push({ p: points[points.length - 1], x: xScale(points[points.length - 1].date.getTime()) });
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#e8ff3a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#e8ff3a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks.map(t => `
        <line class="grid" x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}"/>
        <text class="axis-lbl" x="${padL - 4}" y="${t.y + 3}" text-anchor="end">${formatNum(t.v)}</text>
      `).join('')}
      <path class="area" d="${area}" />
      <path class="line" d="${d}" />
      ${points.map((p, i) => {
        const cx = xScale(p.date.getTime()).toFixed(1);
        const cy = yScale(p.value).toFixed(1);
        const cls = i === points.length - 1 ? 'pt-last' : 'pt';
        const r = i === points.length - 1 ? 4 : 2.5;
        return `<circle class="${cls}" cx="${cx}" cy="${cy}" r="${r}"/>`;
      }).join('')}
      ${xLabels.map(l => `
        <text class="axis-lbl" x="${l.x.toFixed(1)}" y="${H - 8}" text-anchor="middle">${escapeHtml(l.p.dateLabel)}</text>
      `).join('')}
    </svg>
  `;
}

function bindExDetail() {
  document.getElementById('backBtn').addEventListener('click', () => {
    state.view = 'progress'; render();
  });
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  bindMuscleToggle();
  document.querySelectorAll('[data-metric]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.metric = btn.dataset.metric;
      render();
    });
  });
}

// ============================================================
// UTIL
// ============================================================
function openSettings() {
  if (confirm('Reset connection and re-enter the web app URL?')) {
    localStorage.removeItem(LS_URL);
    state.endpoint = '';
    state.data = null;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.session = null;
    state.active = null;
    state.view = 'setup';
    render();
  }
}

function toast(msg, kind) {
  const el = document.createElement('div');
  el.className = 'toast ' + (kind || '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; }, 2400);
  setTimeout(() => el.remove(), 2800);
}

// ============================================================
// REST-TIMER NOTIFICATIONS
// ============================================================
// Ask once, lazily — only when the user first starts a rest timer. Avoids the
// scary permission dialog on app launch.
let _notifPermAsked = false;
function ensureNotificationPermission() {
  if (_notifPermAsked) return;
  _notifPermAsked = true;
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    try { Notification.requestPermission(); } catch (e) {}
  }
}

function showRestDoneNotification(active) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(reg => {
    reg.showNotification('Rest done', {
      body: 'Time for the next set of ' + (active && active.name ? active.name : 'your exercise'),
      // Full-color "信 on black" tile shown in the expanded notification.
      icon: 'icon-notif.png',
      // Transparent silhouette for the Android status bar — Android tints the
      // opaque pixels with the system color, so passing a fully-opaque image
      // (like the regular app icon) renders as a blank white square.
      badge: 'icon-badge.png',
      tag: 'rest-done',
      renotify: true,
      requireInteraction: true,
      vibrate: [200, 100, 200],
      actions: [
        { action: 'next', title: 'Start next' },
        { action: 'add30', title: '+30s' }
      ]
    }).catch(() => {});
  }).catch(() => {});
}

// Receive timer-action messages from the SW (user tapped a notification action
// while the page was backgrounded) and apply them to the in-memory state.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    const msg = e.data || {};
    if (msg.type !== 'timer-action') return;
    handleTimerAction(msg.action);
  });
}
function handleTimerAction(action) {
  const a = state.active;
  if (!a) return;
  if (action === 'add30' && a.timer) {
    a.timer.total += 30;
    a.timer.remaining += 30;
    a.timer.startedAt = Date.now() - (a.timer.total - a.timer.remaining) * 1000;
    a.timer.alerted = false;
    render();
  } else if (action === 'next' || action === 'open') {
    if (a.timer) { stopTimer(); }
    render();
  }
}

// ============================================================
// BOOT
// ============================================================
if (state.endpoint) loadData(); else render();

// ============================================================
// PWA — register the service worker so Android Chrome offers "Install app"
// and the shell keeps working on flaky gym wifi.
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
