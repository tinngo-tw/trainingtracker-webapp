<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Training" />
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1d1d1d;
    --surface-3: #252525;
    --border: #2a2a2a;
    --border-bright: #3a3a3a;
    --text: #f5f5f5;
    --text-dim: #a0a0a0;
    --text-faint: #666;
    --accent: #e8ff3a;
    --accent-ink: #0a0a0a;
    --danger: #ff5a5a;
    --warn: #ffb020;
    --blue: #58a6ff;
    --pink: #ff5a9e;
    --orange: #ff8c5a;
    --muscle: #ff3a3a;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 16px; line-height: 1.4;
    min-height: 100vh; min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  input, select, textarea {
    font-family: inherit; font-size: 16px; color: inherit;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    width: 100%; outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .display { font-family: 'Archivo Black', sans-serif; letter-spacing: -0.02em; text-transform: uppercase; }

  .app { max-width: 560px; margin: 0 auto; padding: 0 16px 140px; padding-top: env(safe-area-inset-top); }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 4px 20px;
    gap: 12px;
  }
  .top-bar h1 {
    margin: 0; font-family: 'Archivo Black', sans-serif;
    font-size: 22px; letter-spacing: -0.02em; text-transform: uppercase;
  }
  .top-bar h1 .dot { color: var(--accent); }
  .top-bar .title-mid {
    font-family: 'Archivo Black', sans-serif; font-size: 14px;
    text-transform: uppercase; letter-spacing: 0.05em;
    flex: 1; text-align: center; color: var(--text-dim);
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.95); }

  .label {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-faint); margin: 0 0 8px;
    font-weight: 700;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px; border-radius: var(--radius-sm);
    font-weight: 600; font-size: 15px;
    background: var(--surface-2); border: 1px solid var(--border);
    transition: transform .1s, background .15s, border-color .15s;
    min-height: 48px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-ghost { background: transparent; }
  .btn-block { width: 100%; }
  .btn-lg { padding: 18px 24px; font-size: 16px; min-height: 58px; }
  .btn-danger { color: var(--danger); border-color: var(--border); }

  /* ===== TAB NAV (bottom) ===== */
  .tab-nav {
    position: fixed; left: 0; right: 0;
    bottom: 0;
    padding-bottom: env(safe-area-inset-bottom);
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    z-index: 30;
    display: none;
  }
  .tab-nav.show { display: flex; }
  .tab-nav .tab {
    flex: 1; padding: 10px 4px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-faint);
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 700;
  }
  .tab-nav .tab.on { color: var(--accent); }
  .tab-nav .tab svg { width: 22px; height: 22px; }

  /* ===== HOME ===== */
  .hero {
    background: linear-gradient(160deg, var(--surface) 0%, #1a1a1a 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 18px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(232,255,58,0.18), transparent 70%);
    pointer-events: none;
  }
  .hero .kicker {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--accent); font-weight: 700; margin-bottom: 8px;
  }
  .hero .count {
    font-family: 'Archivo Black', sans-serif; font-size: 56px; line-height: 1;
    letter-spacing: -0.03em; margin-bottom: 6px;
  }
  .hero .sub { color: var(--text-dim); font-size: 14px; }

  .section-title {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 22px 4px 10px;
  }
  .section-title h3 {
    margin: 0; font-family: 'Archivo Black', sans-serif;
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .section-title .meta { color: var(--text-faint); font-size: 12px; }

  .session-list { display: flex; flex-direction: column; gap: 8px; }
  .session-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    width: 100%; text-align: left; color: inherit; font: inherit;
    cursor: pointer; transition: border-color .15s, transform .1s;
  }
  .session-card:active { transform: scale(0.99); }
  .session-card:hover { border-color: var(--border-bright); }
  .session-card .date { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 500; }
  .session-card .name { font-size: 14px; color: var(--text); margin-top: 2px; }
  .session-card .sets { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .session-card .tab-badge {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint); border: 1px solid var(--border);
    padding: 3px 7px; border-radius: 4px; white-space: nowrap;
  }
  /* Colored type badges */
  .tab-badge.type-push { color: var(--orange); border-color: rgba(255,140,90,0.4); background: rgba(255,140,90,0.08); }
  .tab-badge.type-pull { color: var(--blue); border-color: rgba(88,166,255,0.4); background: rgba(88,166,255,0.08); }
  .tab-badge.type-legs { color: var(--accent); border-color: rgba(232,255,58,0.4); background: rgba(232,255,58,0.08); }
  .tab-badge.type-cardio { color: var(--pink); border-color: rgba(255,90,158,0.4); background: rgba(255,90,158,0.08); }

  /* ===== STAT ROW (home) ===== */
  .stat-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
  }
  .stat-label {
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
  }
  .stat-value {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px; line-height: 1; margin-top: 6px;
    color: var(--accent);
  }
  .stat-value .stat-unit {
    font-size: 14px; color: var(--text-dim); margin-left: 4px;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }
  .stat-sub {
    font-size: 11px; color: var(--text-faint); margin-top: 4px;
  }

  /* ===== CALENDAR ===== */
  .calendar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 12px 10px;
    margin-bottom: 18px;
  }
  .cal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px 10px;
  }
  .cal-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px; letter-spacing: 0.02em; text-transform: uppercase;
  }
  .cal-nav {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface-2); color: var(--text-dim);
    display: grid; place-items: center;
    font-size: 18px; line-height: 1;
  }
  .cal-nav:hover { color: var(--text); }
  .cal-grid-head, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-grid-head {
    padding-bottom: 4px;
  }
  .cal-grid-head > div {
    text-align: center; font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
  }
  .cal-cell {
    aspect-ratio: 1 / 1;
    background: transparent; border: 1px solid transparent;
    border-radius: 6px; padding: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; position: relative;
    color: var(--text-dim); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: default;
  }
  .cal-cell.empty { visibility: hidden; }
  .cal-cell.today {
    border-color: var(--border-bright);
    color: var(--text);
  }
  .cal-cell.trained { cursor: pointer; color: var(--text); }
  .cal-cell.trained:active { transform: scale(0.95); }
  .cal-day { line-height: 1; }
  .cal-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim);
  }
  .cal-cell.type-push .cal-dot { background: var(--orange); }
  .cal-cell.type-pull .cal-dot { background: var(--blue); }
  .cal-cell.type-legs .cal-dot { background: var(--accent); }
  .cal-cell.type-cardio .cal-dot { background: var(--pink); }
  .cal-cell.type-other .cal-dot { background: var(--text-dim); }

  /* ===== PROGRESS TYPE TABS ===== */
  .prog-tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 4px;
    margin-bottom: 14px;
  }
  .prog-tab {
    padding: 10px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.04em;
    transition: background .15s, color .15s;
  }
  .prog-tab.on { background: var(--surface-2); color: var(--text); }
  .prog-tab.on.push { color: var(--orange); box-shadow: inset 0 -2px 0 var(--orange); }
  .prog-tab.on.pull { color: var(--blue); box-shadow: inset 0 -2px 0 var(--blue); }
  .prog-tab.on.legs { color: var(--accent); box-shadow: inset 0 -2px 0 var(--accent); }

  /* ===== DAY DETAIL SHEET ===== */
  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .sheet-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px; letter-spacing: 0.01em; text-transform: uppercase;
  }
  .sheet-body {
    padding: 14px 16px 20px;
    max-height: 75vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
  }
  .ds-session {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
  }
  .ds-session-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .ds-count {
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  .ds-exlist { display: flex; flex-direction: column; gap: 8px; }
  .ds-exrow { padding: 8px 0; border-top: 1px solid var(--border); }
  .ds-exrow:first-child { border-top: 0; padding-top: 0; }
  .ds-exname { font-size: 14px; font-weight: 500; color: var(--text); }
  .ds-exsets { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* ===== RUN LOG ===== */
  .run-type-list {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 18px;
  }
  .run-type-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    text-align: left; transition: border-color .15s, transform .1s;
    width: 100%;
  }
  .run-type-btn:active { transform: scale(0.99); }
  .run-type-btn:hover { border-color: var(--pink); }
  .run-type-btn .rt-label {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px; letter-spacing: 0.01em;
    text-transform: uppercase; color: var(--pink);
    flex: 0 0 auto;
  }
  .run-type-btn .rt-desc {
    flex: 1; font-size: 12px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  .run-type-btn .rt-arrow {
    color: var(--text-faint); font-size: 22px; line-height: 1;
  }
  .run-entry {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 100px;
  }
  .run-entry textarea {
    width: 100%; min-height: 180px; resize: vertical;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }
  .run-hint {
    margin-top: 10px; font-size: 11px; color: var(--text-faint);
    line-height: 1.5;
  }
  .run-hint .mono {
    font-family: 'JetBrains Mono', monospace; color: var(--text-dim);
  }


  .top-bar h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px; letter-spacing: 0.04em;
    text-transform: uppercase; margin: 0;
  }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-faint); font-size: 14px; }

  /* ===== SESSION TYPE CARDS ===== */
  .type-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 18px;
  }
  .type-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 18px;
    position: relative; overflow: hidden;
    text-align: left; min-height: 140px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: transform .1s, border-color .15s;
  }
  .type-card:active { transform: scale(0.98); }
  .type-card .type-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: grid; place-items: center;
    position: relative; overflow: hidden;
  }
  .type-card .type-icon svg { width: 30px; height: 30px; }
  .type-card .type-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px; letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .type-card .type-meta {
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 4px; font-weight: 600;
  }

  /* Type card icons — static, no animation */

  .type-card.push .type-icon { color: var(--orange); }
  .type-card.pull .type-icon { color: var(--blue); }
  .type-card.legs .type-icon { color: var(--accent); }
  .type-card.cardio .type-icon { color: var(--pink); }

  /* ===== MUSCLE SILHOUETTE ===== */
  .muscle-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 14px;
  }
  .muscle-box .mb-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .muscle-box .mb-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-faint); font-weight: 700;
  }
  .muscle-box .view-toggle {
    display: inline-flex; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px; gap: 2px;
  }
  .muscle-box .view-toggle button {
    padding: 5px 12px; border-radius: 999px; font-size: 12px;
    color: var(--text-dim); font-weight: 600;
  }
  .muscle-box .view-toggle button.on { background: var(--accent); color: var(--accent-ink); }
  .muscle-svg-wrap {
    display: flex; justify-content: center; padding: 6px 0;
  }
  .muscle-svg {
    width: 100%; max-width: 220px; height: auto;
  }
  .muscle-svg .body { fill: #2e2e2e; stroke: #1a1a1a; stroke-width: 0.5; }
  .muscle-svg .m { fill: #3a3a3a; stroke: #1a1a1a; stroke-width: 0.5; transition: fill 0.3s; }
  .muscle-svg .m.hit { fill: var(--muscle); }
  .muscle-list {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    justify-content: center;
  }
  .muscle-chip {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    background: rgba(255, 58, 58, 0.15); color: var(--muscle);
    border: 1px solid rgba(255, 58, 58, 0.3);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }

  /* ===== SESSION SCREEN ===== */
  .session-meta-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .session-meta-bar .st-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-faint); font-weight: 700; margin-bottom: 4px;
  }
  .session-meta-bar .st-value {
    font-family: 'Archivo Black', sans-serif; font-size: 16px;
    text-transform: uppercase; letter-spacing: -0.01em;
  }
  .session-meta-bar .st-date { color: var(--accent); }

  .exercise-done-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .done-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
  }
  .done-card .dc-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .done-card .dc-name { font-size: 14px; font-weight: 600; }
  .done-card .dc-sets {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--accent); margin-top: 2px;
  }
  .done-card .dc-check {
    font-size: 14px; color: var(--accent);
  }

  /* ===== EXERCISE SCREEN ===== */
  .ex-hero {
    background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 14px;
  }
  .ex-hero .ex-kicker {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent); font-weight: 700; margin-bottom: 6px;
  }
  .ex-hero .ex-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 24px; letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .history-strip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    margin-bottom: 14px;
  }
  .history-strip .hs-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-faint); margin-bottom: 6px; font-weight: 700;
  }
  .history-strip .hs-line {
    display: flex; gap: 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-dim); align-items: baseline;
    padding: 2px 0;
  }
  .history-strip .hs-date {
    color: var(--accent); min-width: 60px; font-size: 11px;
  }

  .phase-tabs {
    display: flex; gap: 4px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 3px; margin-bottom: 14px;
  }
  .phase-tabs button {
    flex: 1; padding: 10px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
  }
  .phase-tabs button.on {
    background: var(--accent); color: var(--accent-ink);
  }
  .phase-tabs button .ptn {
    font-size: 10px; opacity: 0.7; margin-left: 4px;
  }

  .set-log { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .set-log-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .set-log-row .sl-num {

  }
  .set-log-row .sl-rm { color: var(--text-faint); padding: 4px 8px; }

  /* ===== SET INPUT ===== */
  .set-input {
    background: var(--surface); border: 2px solid var(--border-bright);

  }
  .set-input .si-phase {

  }
  .set-input.warmup { border-color: var(--warn); }
  .set-input.warmup .si-phase { color: var(--warn); }
  .set-input.working { border-color: var(--accent); }
  .set-input.working .si-phase { color: var(--accent); }
  .set-input .si-num { font-size: 11px; color: var(--text-faint); font-weight: 600; }

  .input-grid {
    display: grid; grid-template-columns: 1fr 1fr;

  .input-grid input {

  .stepper-group button {

  .si-actions { display: flex; gap: 8px; }

  /* ===== TIMER ===== */
  .timer-card {
    background: linear-gradient(180deg, var(--surface) 0%, #1a1a1a 100%);

  /* ===== PROGRESS / EXERCISE DETAIL ===== */
  .ex-browse {

  }

  .ex-browse .eb-list {
    max-height: 400px; overflow-y: auto;

  }
  .ex-browse .eb-item {
    text-align: left; padding: 10px 12px; border-radius: var(--radius-sm);

  }
  .ex-browse .eb-item:active { border-color: var(--accent); }
  .ex-browse .eb-name { font-size: 14px; font-weight: 500; }
  .ex-browse .eb-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;

  }

  .chart-box {
    background: var(--surface); border: 1px solid var(--border);

  }
  .chart-box .cb-head {
    display: flex; justify-content: space-between; align-items: center;

  }
  .chart-box .cb-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;

  .chart-box .cb-value {

  }
  .chart-box .cb-unit { font-size: 12px; color: var(--text-faint); font-family: 'Inter', sans-serif; margin-left: 4px; font-weight: 400; }
  .chart-box .cb-delta {
    font-size: 12px; margin-top: 2px;

  }
  .chart-box .cb-delta.up { color: var(--accent); }
  .chart-box .cb-delta.down { color: var(--danger); }
  .metric-toggle {
    display: inline-flex; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px; gap: 2px; margin-bottom: 10px;

  }
  .metric-toggle button {
    padding: 6px 12px; border-radius: 999px; font-size: 12px;

  .metric-toggle button.on { background: var(--accent); color: var(--accent-ink); }
  .chart-svg { width: 100%; height: 220px; display: block; }
  .chart-svg .grid { stroke: var(--border); stroke-width: 0.5; }
  .chart-svg .axis-lbl { fill: var(--text-faint); font-size: 9px; font-family: 'JetBrains Mono', monospace; }
  .chart-svg .line { fill: none; stroke: var(--accent); stroke-width: 2; }
  .chart-svg .area { fill: url(#chartGradient); opacity: 0.35; }

  .hist-table {

  .hist-row {
    display: flex; justify-content: space-between; align-items: baseline;

  }
  .hist-row:last-child { border-bottom: none; }
  .hist-row .h-date { color: var(--accent); min-width: 60px; flex-shrink: 0; }
  .hist-row .h-sets { color: var(--text-dim); flex: 1; word-break: break-word; }
  .hist-row .h-1rm { color: var(--text); white-space: nowrap; font-weight: 500; }

  /* ===== MODAL / PICKER ===== */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .2s;
  }
  .modal {
    background: var(--surface); width: 100%; max-width: 560px;
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    max-height: 85vh; display: flex; flex-direction: column;

    padding: 12px 18px 14px; display: flex; align-items: center; justify-content: space-between;

  .modal-body { padding: 14px 18px; overflow-y: auto; flex: 1; }

  .ex-item {
    width: 100%; text-align: left;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--surface-2); border: 1px solid transparent;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    margin-bottom: 4px;

  .ex-item:active { border-color: var(--accent); }
  .ex-item .ex-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; }
  .ex-item .ex-last {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;

  .ex-item .ex-badge {

  /* ===== FAB ===== */
  .fab {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(76px + env(safe-area-inset-bottom));
    z-index: 20;
    width: calc(100% - 32px); max-width: 528px;
  }
  .fab.no-tabs {
    bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .fab .btn-primary {
    width: 100%; min-height: 58px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(232,255,58,0.25);
  }

  /* ===== SETUP ===== */
  .setup-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .setup-card h2 { margin: 0 0 6px; font-size: 20px; }
  .setup-card p { color: var(--text-dim); font-size: 14px; margin: 0 0 16px; }
  .setup-card ol { padding-left: 20px; color: var(--text-dim); font-size: 14px; line-height: 1.7; margin: 0 0 16px; }
  .setup-card code {
    background: var(--surface-2); padding: 2px 6px; border-radius: 4px;
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: calc(90px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: 10px; padding: 12px 18px;
    z-index: 100; font-size: 14px;
    animation: slideUp .25s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--accent); color: var(--accent); }

  /* ===== LOADING ===== */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-full { display: grid; place-items: center; padding: 60px 20px; gap: 12px; color: var(--text-dim); font-size: 13px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 1s infinite; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>

<body>
<div class="app" id="app">
  <div class="loading-full"><div class="spinner"></div><div>Loading…</div></div>
</div>
<div class="tab-nav" id="tabNav"></div>

<script>
// ============================================================
// STATE
// ============================================================
const LS_URL = 'tt_endpoint';

let state = {
  endpoint: localStorage.getItem(LS_URL) || '',
  view: 'home',              // 'home' | 'session' | 'exercise' | 'progress' | 'exDetail' | 'setup'
  data: null,
  loading: false,

  // Active session
  session: null,
  // Active exercise being logged
  active: null,

  // Progress tab state
  progress: { query: '', selectedExercise: null, metric: '1rm', typeFilter: 'push' }, // '1rm' | 'top' | 'volume'; typeFilter: 'push' | 'pull' | 'legs'

  // Muscle chart state
  muscleView: 'front',

  // Picker state
  picker: { open: false, onPick: null, query: '', forType: null },

  // Calendar state (which month is shown on home screen)
  calendar: { year: new Date().getFullYear(), month: new Date().getMonth() },

  // Day detail modal state (null = closed)
  daySheet: null, // { dateKey: 'YYYY-MM-DD' } when open

  // Run log state (null when not in run log flow)
  runLog: null, // { phase: 'pickType'|'entry', runType, text, saving }

  // Timer singleton
  timer: null
};

// ============================================================
// MUSCLE MAPPING
// ============================================================
// Maps keywords in exercise names to muscle groups
// Muscle IDs correspond to path IDs in the SVG
const MUSCLE_MAP = [
  // chest
  { match: ['bench','chest press','incline press','decline press','db incline','db press','plate chest','plate bench','disk chest','fly','flye','bb chest'], muscles: ['chest'] },
  // shoulders
  { match: ['shoulder press','ohp','overhead press','military press','plate shoulder','db shoulder','machine shoulder','disk shoulder'], muscles: ['delts','chest','triceps'] },
  { match: ['lateral raise','side raise','cable lateral','plate lateral'], muscles: ['delts'] },
  { match: ['face pull','rear delt','reverse fly'], muscles: ['rearDelts','traps'] },
  { match: ['shrug'], muscles: ['traps'] },
  // triceps
  { match: ['tricep extension','tricep pushdown','pushdown','skull crusher','cable tricep','overhead tricep'], muscles: ['triceps'] },
  { match: ['dip'], muscles: ['triceps','chest'] },
  // biceps
  { match: ['bicep curl','arm curl','preacher curl','preacher','ez bar curl','ez bar preacher','bicep extension'], muscles: ['biceps'] },
  { match: ['hammer curl'], muscles: ['biceps','forearms'] },
  // back
  { match: ['lat pulldown','pulldown'], muscles: ['lats','biceps'] },
  { match: ['assisted chin','pull up','pullup','chin up','chin'], muscles: ['lats','biceps'] },
  { match: ['row','iso lat row','iso high row','cable row','plate iso'], muscles: ['lats','rearDelts','traps','biceps'] },
  // legs
  { match: ['squat','belt squat'], muscles: ['quads','glutes','hams'] },
  { match: ['leg press'], muscles: ['quads','glutes','hams'] },
  { match: ['leg extension','leg ext'], muscles: ['quads'] },
  { match: ['leg curl','seating leg curl','lying leg curl'], muscles: ['hams'] },
  { match: ['deadlift'], muscles: ['hams','glutes','lowerBack','traps','forearms'] },
  { match: ['rdl','romanian'], muscles: ['hams','glutes','lowerBack'] },
  { match: ['lunge'], muscles: ['quads','glutes','hams'] },
  { match: ['calf'], muscles: ['calves'] },
  { match: ['hip abduct','abduction'], muscles: ['glutes'] },
  { match: ['hip adduct','adduction'], muscles: ['glutes'] },
  { match: ['glute'], muscles: ['glutes','hams'] },
  { match: ['back extension','hyperextension'], muscles: ['lowerBack','glutes','hams'] },
  // core
  { match: ['abs curl','abs crunch','crunch','sit up','situp','evening crunch'], muscles: ['abs'] },
  { match: ['plank'], muscles: ['abs'] },
  // cardio
  { match: ['run','jog','treadmill'], muscles: ['quads','hams','calves','glutes'] },
  { match: ['bike','cycle','cycling'], muscles: ['quads','hams','glutes','calves'] },
  { match: ['rowing','row machine','erg'], muscles: ['lats','biceps','quads','lowerBack'] },
];

function musclesFor(exerciseName) {
  if (!exerciseName) return [];
  const n = exerciseName.toLowerCase();
  for (const rule of MUSCLE_MAP) {
    if (rule.match.some(k => n.includes(k))) return rule.muscles.slice();
  }
  return [];
}

// Which muscles are on front vs back view
const MUSCLE_SIDE = {
  chest: 'front', delts: 'front', biceps: 'front', forearms: 'front',
  abs: 'front', quads: 'front', calves: 'both',
  traps: 'back', rearDelts: 'back', lats: 'back', triceps: 'back',
  lowerBack: 'back', hams: 'back', glutes: 'back'
};

// Pretty name
const MUSCLE_NAMES = {
  chest: 'Chest', delts: 'Shoulders', biceps: 'Biceps', forearms: 'Forearms',
  abs: 'Abs', quads: 'Quads', calves: 'Calves',
  traps: 'Traps', rearDelts: 'Rear Delts', lats: 'Lats', triceps: 'Triceps',
  lowerBack: 'Lower Back', hams: 'Hamstrings', glutes: 'Glutes'
};

// ============================================================
// API
// ============================================================
async function api(action, body) {
  if (!state.endpoint) throw new Error('No endpoint configured');
  const url = state.endpoint + (state.endpoint.includes('?') ? '&' : '?') + 'action=' + action;
  const opts = { method: body ? 'POST' : 'GET', redirect: 'follow' };
  if (body) {
    opts.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadData() {
  state.loading = true; render();
  try {
    state.data = await api('bootstrap');
  } catch (err) {
    toast('Could not load data: ' + err.message, 'error');
    state.view = 'setup';
  } finally {
    state.loading = false; render();
  }
}

// ============================================================
// HELPERS
// ============================================================
function todayFormatted() {
  const d = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function classifyExercise(name) {
  const n = (name || '').toLowerCase();
  const kw = {
    cardio: ['run','jog','cycle','bike','walk','cardio','treadmill','rowing','elliptical','swim'],
    legs:   ['squat','leg press','leg ext','leg curl','calf','lunge','hip','glute','abduct','adduct','rdl','deadlift'],
    push:   ['bench','chest press','shoulder press','tricep','lateral raise','overhead press','ohp','push','dip','db press','incline press','decline press','fly','flye','skull crusher','pushdown'],
    pull:   ['pull','row','chin','lat pulldown','curl','face pull','rear delt','shrug','bicep','hammer','preacher']
  };
  for (const t of ['cardio','legs','push','pull']) {
    if (kw[t].some(k => n.includes(k))) return t;
  }
  return 'other';
}

function formatTime(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function findExercise(name) {
  if (!state.data || !name) return null;
  return (state.data.exercises || []).find(e => e.name.toLowerCase() === name.toLowerCase());
}

function fmtSet(weight, reps) {
  const w = (weight === '' || weight == null) ? 'BW' : String(weight);
  return w + 'x' + reps;
}

function formatExerciseSets(warmupSets, workingSets) {
  const warmParts = (warmupSets || []).filter(s => s.reps && s.reps > 0)
    .map(s => 'W:' + fmtSet(s.weight, s.reps));
  const clean = (workingSets || []).filter(s => s.reps && s.reps > 0);
  const groups = [];
  for (const s of clean) {
    const last = groups[groups.length - 1];
    if (last && last.weight === s.weight && last.reps === s.reps) {
      last.count += 1;
    } else {
      groups.push({ weight: s.weight, reps: s.reps, count: 1 });
    }
  }
  const workParts = groups.map(g => {
    let base = fmtSet(g.weight, g.reps);
    if (g.count > 1) base += 'x' + g.count;
    return base;
  });
  return warmParts.concat(workParts).join(', ');
}

function isCompound(name) {
  const n = (name || '').toLowerCase();
  const cs = ['bench','squat','deadlift','row','pull up','pulldown','chin','overhead press','ohp','shoulder press','chest press','leg press','rdl'];
  return cs.some(k => n.includes(k));
}

function suggestedRest(name) {
  const n = (name || '').toLowerCase();
  const iso = ['curl','raise','fly','flye','pushdown','extension','calf','abs','crunch','sit up','situp','face pull','hip','abduct','adduct'];
  if (iso.some(k => n.includes(k))) return 90;
  if (isCompound(name)) return 240;
  return 180;
}

// ============================================================
// SET STRING PARSER (for reading history)
// ============================================================
function parseSetsString(str) {
  if (!str) return { sets: [], cardio: null, parseable: false };
  const cleaned = str.replace(/\([^)]*\)/g, '').trim();
  const parts = cleaned.split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return { sets: [], cardio: null, parseable: false };
  const sets = [];
  let parsedAny = false, lastWeight = null;
  for (const p of parts) {
    let raw = p;
    const isWarmup = /^W:/i.test(raw);
    raw = raw.replace(/^W:/i, '').trim();
    raw = raw.replace(/\s+[a-zA-Zà-ỹ]+\s*$/i, ''); // trailing word
    const norm = raw.replace(/\s*[xX]\s*/g, 'x').trim();
    const tokens = norm.split('x').map(t => t.trim());
    if (tokens.length < 2) continue;
    let weight, reps, count = 1;
    const w = tokens[0];
    if (w === '') {
      weight = lastWeight;
    } else if (/^bw$|^bodyweight$/i.test(w)) {
      weight = 0;
    } else if (/^bar$/i.test(w)) {
      weight = 20;
    } else {
      const n = parseFloat(w);
      if (isNaN(n)) continue;
      weight = n;
    }
    reps = parseInt(tokens[1], 10);
    if (isNaN(reps)) continue;
    if (tokens[2]) {
      const c = parseInt(tokens[2], 10);
      if (!isNaN(c)) count = c;
    }
    for (let i = 0; i < count; i++) sets.push({ weight, reps, isWarmup });
    lastWeight = weight;
    parsedAny = true;
  }
  if (!parsedAny) return { sets: [], cardio: str.trim(), parseable: false };
  return { sets, cardio: null, parseable: true };
}

function epley1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

function sessionMetrics(sets) {
  const working = sets.filter(s => !s.isWarmup);
  if (working.length === 0) return null;
  let best1RM = 0, topWeight = 0, volume = 0;
  for (const s of working) {
    const rm = epley1RM(s.weight, s.reps);
    if (rm > best1RM) best1RM = rm;
    if (s.weight > topWeight) topWeight = s.weight;
    volume += s.weight * s.reps;
  }
  return {
    est1RM: Math.round(best1RM * 10) / 10,
    topSet: topWeight,
    volume: Math.round(volume)
  };
}

// Parse sheet date like "March 6" or "April 18" into a Date
// We guess the year: if the month is > current month, assume last year
function parseSheetDate(dateStr) {
  if (!dateStr) return null;
  const months = { january:0, february:1, march:2, april:3, may:4, june:5, july:6, august:7, september:8, october:9, november:10, december:11 };
  const m = String(dateStr).trim().match(/([A-Za-z]+)\s*(\d+)/);
  if (!m) return null;
  const mo = months[m[1].toLowerCase()];
  const day = parseInt(m[2], 10);
  if (mo === undefined || isNaN(day)) return null;
  const now = new Date();
  let year = now.getFullYear();
  // If the date in the sheet is later than today in the current year, it likely happened last year
  const candidate = new Date(year, mo, day);
  if (candidate > now) year -= 1;
  return new Date(year, mo, day);
}

// Collect full history for an exercise with parsed sets
// ============================================================
// SHEET 8 FILTERING + SESSION GROUPING + STREAK + CALENDAR
// ============================================================
// The charts and home metrics should only use Sheet 8 (Mar+Apr 2026 onward).
// Tab label in the sheet may be "Sheet 8", "Sheet8", or similar — we match
// loosely so small naming changes don't break things.
function isSheet8Tab(tab) {
  if (!tab) return false;
  const t = String(tab).toLowerCase().replace(/\s+/g, '');
  return t === 'sheet8' || t.includes('sheet8');
}

// Get Sheet-8-only recent session rows (one row per exercise per day).
function sheet8Rows() {
  if (!state.data || !state.data.recentSessions) return [];
  return state.data.recentSessions.filter(s => isSheet8Tab(s.tab));
}

// Group rows into sessions: one session = one (date + sessionType) pair.
// Session type is derived from the exercises in that day — majority wins,
// falls back to 'other' only if nothing classifies.
// Returns array sorted newest-first: [{ dateLabel, dateObj, type, exercises: [...] }]
function groupedSheet8Sessions() {
  const rows = sheet8Rows();
  const byKey = new Map();
  for (const r of rows) {
    const dateObj = parseSheetDate(r.date);
    if (!dateObj) continue;
    const dayType = classifyExercise(r.exercise);
    // Preliminary key by date only; we'll merge same-day entries and pick
    // a dominant type so "Push session" shows once even if a cardio warmup row exists.
    const key = dateObj.toISOString().slice(0, 10);
    if (!byKey.has(key)) {
      byKey.set(key, { dateObj, dateLabel: r.date, typeCounts: {}, exercises: [] });
    }
    const bucket = byKey.get(key);
    bucket.exercises.push({ name: r.exercise, sets: r.sets, type: dayType });
    bucket.typeCounts[dayType] = (bucket.typeCounts[dayType] || 0) + 1;
  }
  const sessions = [];
  for (const b of byKey.values()) {
    // Pick dominant type, preferring push/pull/legs/cardio over 'other'
    const ordered = ['push','pull','legs','cardio','other'];
    let best = 'other', bestCount = -1;
    for (const t of ordered) {
      const c = b.typeCounts[t] || 0;
      if (c > bestCount) { best = t; bestCount = c; }
    }
    sessions.push({
      dateObj: b.dateObj,
      dateLabel: b.dateLabel,
      type: best,
      exercises: b.exercises
    });
  }
  sessions.sort((a, b) => b.dateObj - a.dateObj);
  return sessions;
}

// Set of YYYY-MM-DD strings where at least one Sheet 8 session exists.
// Value is the dominant type for that day, for calendar coloring.
function trainedDayMap() {
  const map = new Map();
  for (const s of groupedSheet8Sessions()) {
    const key = s.dateObj.toISOString().slice(0, 10);
    map.set(key, s.type);
  }
  return map;
}

// Week streak: count of consecutive ISO weeks (Mon–Sun) ending with the
// current week, where each week has >= TARGET sessions.
// Current week counts even if incomplete (you might still hit target this week).
// Previous weeks must have met target to continue the streak.
const STREAK_TARGET = 3;
function weekKey(d) {
  // Monday-anchored week key YYYY-WW
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay() + 6) % 7; // Mon=0 .. Sun=6
  dt.setUTCDate(dt.getUTCDate() - dayNum + 3); // Thursday of this ISO week
  const firstThursday = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
  const diff = (dt - firstThursday) / 86400000;
  const week = 1 + Math.round((diff - (3 - ((firstThursday.getUTCDay() + 6) % 7))) / 7);
  return dt.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
}
function computeWeekStreak() {
  const sessions = groupedSheet8Sessions();
  if (sessions.length === 0) return { streak: 0, thisWeekCount: 0, target: STREAK_TARGET };
  const byWeek = new Map();
  for (const s of sessions) {
    const k = weekKey(s.dateObj);
    byWeek.set(k, (byWeek.get(k) || 0) + 1);
  }
  // Walk backward week by week from this week
  const now = new Date();
  let cursor = new Date(now);
  const thisWeekCount = byWeek.get(weekKey(cursor)) || 0;

  let streak = 0;
  // If current week already hit target, count it and keep going
  // If current week hasn't hit target yet, don't count it but also don't break streak (week isn't over)
  let started = false;
  while (true) {
    const k = weekKey(cursor);
    const count = byWeek.get(k) || 0;
    if (!started) {
      // Current (latest) week being evaluated
      if (count >= STREAK_TARGET) { streak++; started = true; }
      else { started = true; /* skip current week, may still be in progress */ }
    } else {
      if (count >= STREAK_TARGET) streak++;
      else break;
    }
    // Move to previous week
    cursor.setDate(cursor.getDate() - 7);
    // Safety: stop if we go before data start
    if (cursor < sessions[sessions.length - 1].dateObj) {
      // Evaluate this last week too before breaking
      const lk = weekKey(cursor);
      if ((byWeek.get(lk) || 0) >= STREAK_TARGET) streak++;
      break;
    }
  }
  return { streak, thisWeekCount, target: STREAK_TARGET };
}

// Date-based Sheet 8 check — Sheet 8 covers March 2026 onward.
// Use this when the tab field isn't available (per-exercise history entries).
const SHEET8_START = new Date(2026, 2, 1); // March 1, 2026
function isSheet8Entry(h) {
  // Prefer explicit tab field if present
  if (h && h.tab != null) return isSheet8Tab(h.tab);
  // Fall back to date
  const d = parseSheetDate(h && h.date);
  return d && d >= SHEET8_START;
}

// Display label for a session type on the home/calendar/day sheet.
// Cardio sessions are now labeled "Run" since the flow is a run log.
function typeDisplayName(type) {
  if (type === 'cardio') return 'Run';
  if (type === 'other') return 'Session';
  return type[0].toUpperCase() + type.slice(1);
}

function fullHistoryFor(exerciseName) {
  if (!state.data || !state.data.recentSessions) return [];
  const ex = findExercise(exerciseName);
  if (!ex || !ex.history) return [];
  return ex.history
    // Only count history entries from Sheet 8 (Mar 2026 onward)
    .filter(h => isSheet8Entry(h))
    .map(h => {
      const parsed = parseSetsString(h.sets);
      const metrics = parsed.parseable ? sessionMetrics(parsed.sets) : null;
      return {
        ...h,
        parsed: parsed.sets,
        cardio: parsed.cardio,
        metrics: metrics,
        date: h.date,
        dateObj: parseSheetDate(h.date),
      };
    }).filter(h => h.dateObj).sort((a, b) => a.dateObj - b.dateObj);
}

function rankExercises(sessionType, excludeNames, afterExercise) {
  const ex = state.data.exercises || [];
  const s8 = state.data.sheet8 || { typeFrequency: {}, nextAfter: {}, frequency: {} };
  const ranked = ex.map(e => {
    const typeFreq = (s8.typeFrequency[e.name] || {})[sessionType] || 0;
    const freq = s8.frequency[e.name] || 0;
    const nextScore = afterExercise && s8.nextAfter[afterExercise]
      ? (s8.nextAfter[afterExercise][e.name] || 0) : 0;
    const typeMatch = e.type === sessionType ? 1 : 0;
    const score = nextScore * 1000 + typeFreq * 100 + freq * 10 + typeMatch * 5;
    return { e, score, nextScore, typeFreq };
  }).filter(r => !excludeNames || !excludeNames.includes(r.e.name));
  const relevant = ranked.filter(r => r.score > 0);
  const other = ranked.filter(r => r.score === 0);
  relevant.sort((a, b) => b.score - a.score);
  other.sort((a, b) => a.e.name.localeCompare(b.e.name));
  return relevant.concat(other).map(r => ({ ...r.e, _score: r.score, _nextScore: r.nextScore }));
}

// ============================================================
// RENDER: ROUTER
// ============================================================
function render() {
  const root = document.getElementById('app');
  const tabNav = document.getElementById('tabNav');

  if (!state.endpoint) {
    root.innerHTML = renderSetup();
    tabNav.className = 'tab-nav';
    bindSetup();
    return;
  }
  if (state.loading) {
    root.innerHTML = '<div class="loading-full"><div class="spinner"></div><div>Loading…</div></div>';
    tabNav.className = 'tab-nav';
    return;
  }

  const existing = document.getElementById('pickerBackdrop');
  if (existing) existing.remove();

  // Only show tab nav on home and progress views
  const showTabs = ['home', 'progress', 'exDetail'].includes(state.view);
  tabNav.className = 'tab-nav' + (showTabs ? ' show' : '');
  tabNav.innerHTML = showTabs ? renderTabNav() : '';

  if (state.view === 'home') {
    root.innerHTML = renderTopBar() + renderHome();
    bindHome();
  } else if (state.view === 'session') {
    root.innerHTML = renderTopBar('session') + renderSession();
    bindSession();
  } else if (state.view === 'exercise') {
    root.innerHTML = renderTopBar('exercise') + renderExercise();
    bindExercise();
  } else if (state.view === 'progress') {
    root.innerHTML = renderTopBar() + renderProgress();
    bindProgress();
  } else if (state.view === 'exDetail') {
    root.innerHTML = renderTopBar('detail') + renderExDetail();
    bindExDetail();
  } else if (state.view === 'runLog') {
    root.innerHTML = renderTopBar('runLog') + renderRunLog();
    bindRunLog();
  }

  if (showTabs) bindTabNav();
  if (state.picker.open) {
    document.body.insertAdjacentHTML('beforeend', renderPicker());
    bindPicker();
  }
  if (state.daySheet) {
    const existingDs = document.getElementById('daySheetBackdrop');
    if (existingDs) existingDs.remove();
    document.body.insertAdjacentHTML('beforeend', renderDaySheet());
    bindDaySheet();
  }
}

  const title = `${weekdays[dt.getDay()]} · ${months[dt.getMonth()]} ${dt.getDate()}`;

  const body = sessions.length === 0

              ${s.exercises.map(e => `

        `;

// Month calendar with dots on trained days.
function renderCalendar(trainedDays) {
  const cal = state.calendar || { year: new Date().getFullYear(), month: new Date().getMonth() };
  const y = cal.year, m = cal.month;
  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const startCol = (first.getDay() + 6) % 7; // Mon=0 .. Sun=6
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = new Date();
  const todayKey = today.toISOString().slice(0,10);

  let cells = '';
  // Empty leading cells
  for (let i = 0; i < startCol; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const dt = new Date(y, m, day);
    const key = dt.toISOString().slice(0,10);
    const type = trainedDays.get(key);
    const isToday = key === todayKey;
    const classes = ['cal-cell'];
    if (type) classes.push('trained', 'type-' + type);
    if (isToday) classes.push('today');
    const selAttr = type ? `data-session-date="${key}"` : '';
    cells += `<button class="${classes.join(' ')}" ${selAttr}><span class="cal-day">${day}</span>${type ? '<span class="cal-dot"></span>' : ''}</button>`;
  }

  return `
    <div class="calendar">
      <div class="cal-head">
        <button class="cal-nav" id="calPrev" aria-label="Previous month">‹</button>
        <div class="cal-title">${months[m]} ${y}</div>
        <button class="cal-nav" id="calNext" aria-label="Next month">›</button>
      </div>
      <div class="cal-grid-head">
        <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
  `;
}

async function saveRunLog() {
  const r = state.runLog;
  if (!r || !r.runType) { toast('Pick a run type first', 'error'); return; }
  const text = (r.text || '').trim();
  if (!text) { toast('Type your run details first', 'error'); return; }

  const rt = RUN_TYPES.find(t => t.id === r.runType);
  const label = rt ? rt.label : 'Run';
  const setsString = `${label} · ${text}`;

  r.saving = true; render();
  try {
    await api('addSession', {
      date: todayFormatted(),
      sessionType: 'Cardio',
      entries: [{ exercise: 'Run', sets: setsString, notes: '' }]
    });
    toast('Run saved', 'success');
    state.runLog = null;
    state.view = 'home';
    await loadData();
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
    r.saving = false;
    render();
  }
}

function renderExercise() {
  const a = state.active;
  if (!a) return '';

function renderLoggedSets(a) {
  const all = [
    ...a.warmupSets.map((s, i) => ({ ...s, kind: 'warmup', idx: i })),
    ...a.workingSets.map((s, i) => ({ ...s, kind: 'working', idx: i }))
  ];
  if (all.length === 0) return '';
  return `
    <div class="set-log">
      ${all.map((s, i) => `
        <div class="set-log-row ${s.kind}">
          <div class="sl-num">${s.kind === 'warmup' ? 'W' : i - a.warmupSets.length + 1}</div>
          <div class="sl-body">
            <span class="sl-w">${escapeHtml(s.weight === '' ? 'BW' : s.weight)}</span>
            <span class="sl-x">×</span>
            <span class="sl-r">${escapeHtml(String(s.reps))}</span>
            ${s.restAfter != null ? `<span class="sl-rest"> · rested ${formatTime(s.restAfter)}</span>` : ''}
          </div>
          <button class="sl-rm" data-rmset="${s.kind}:${s.idx}" aria-label="Remove">×</button>
        </div>
      `).join('')}
    </div>
  `;
}

function renderSetInput(a, setNum) {
  const exMeta = findExercise(a.name);
  let suggestW = '', suggestR = '';
  if (exMeta && exMeta.history && exMeta.history[0]) {
    const parsed = parseFirstSetHint(exMeta.history[0].sets, a.phase === 'warmup');
    if (parsed) { suggestW = parsed.weight; suggestR = parsed.reps; }
  }
  const prevInPhase = a.phase === 'warmup'
    ? a.warmupSets[a.warmupSets.length - 1]
    : a.workingSets[a.workingSets.length - 1];
  if (prevInPhase) { suggestW = prevInPhase.weight; suggestR = prevInPhase.reps; }
  const currentW = a.current.weight !== '' ? a.current.weight : suggestW;
  const currentR = a.current.reps !== '' ? a.current.reps : suggestR;

  return `
    <div class="set-input ${a.phase}">
      <div class="si-head">
        <div class="si-phase">${a.phase === 'warmup' ? 'Warmup Set' : 'Working Set'}</div>
        <div class="si-num">Set #${setNum}</div>
      </div>
      <div class="input-grid">
        <div>
          <label class="label">Weight (kg)</label>
          <input id="wIn" type="text" inputmode="decimal" placeholder="kg / BW"
                 value="${escapeHtml(String(currentW))}" autocomplete="off" />
        </div>
        <div>
          <label class="label">Reps</label>
          <input id="rIn" type="text" inputmode="numeric" placeholder="reps"
                 value="${escapeHtml(String(currentR))}" autocomplete="off" />
        </div>
      </div>
      <div class="steppers">
        <div class="stepper-group">
          <button data-w-adj="-2.5">−2.5</button>
          <button data-w-adj="-0.5">−0.5</button>
          <button data-w-adj="0.5">+0.5</button>
          <button data-w-adj="2.5">+2.5</button>
        </div>
        <div class="stepper-group">
          <button data-r-adj="-1">−1</button>
          <button data-r-adj="1">+1</button>
        </div>
      </div>
      <div class="si-actions">
        <button class="btn btn-primary btn-block btn-lg" id="finishSetBtn">Finish Set → Rest</button>
      </div>
    </div>
  `;
}

function parseFirstSetHint(str, preferWarmup) {
  if (!str) return null;
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return null;
  const p = preferWarmup ? parts[0] : parts[parts.length - 1];
  let raw = p.replace(/^W:/i, '').trim();
  const norm = raw.replace(/\s*x\s*/gi, 'x');
  const tokens = norm.split('x');
  if (tokens.length < 2) return null;
  let weight = tokens[0], reps = parseInt(tokens[1], 10);
  if (weight === '' && tokens[0] === '') weight = 'BW';
  if (isNaN(reps)) return null;
  if (/bw/i.test(weight)) weight = '';
  if (/bar/i.test(weight)) weight = '';
  return { weight: weight, reps: reps };
}

function renderTimer(a) {
  const t = a.timer;
  const total = t.total, remaining = t.remaining;
  const isOver = remaining < 0;
  const pct = isOver ? 0 : Math.max(0, (remaining / total) * 100);
  return `
    <div class="timer-card ${isOver ? 'overtime' : ''}">
      <div class="t-label">${isOver ? 'Rest Overtime' : 'Resting'}</div>
      <div class="t-display ${remaining <= 10 && remaining >= 0 ? 'pulse' : ''}">
        ${isOver ? '+' : ''}${formatTime(Math.abs(remaining))}
      </div>
      <div class="t-suggest">Suggested: ${formatTime(total)} · ${isCompound(a.name) ? 'Compound' : (a.restSec <= 90 ? 'Isolation' : 'Medium')}</div>
      <div class="t-actions">
        <button class="btn" id="addTimeBtn">+30s</button>
        <button class="btn btn-primary" id="nextSetBtn">Start Next Set</button>
      </div>
      <div class="t-progress" style="width: ${pct}%;"></div>
    </div>
  `;
}

function bindExercise() {
  const a = state.active;
  document.getElementById('backBtn').addEventListener('click', () => {
    if (a.workingSets.length > 0 || a.warmupSets.length > 0) {
      if (!confirm('Discard this exercise?')) return;
    }
    state.active = null;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.view = 'session';
    render();
  });
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  bindMuscleToggle();

  document.querySelectorAll('[data-phase]').forEach(btn => {
    btn.addEventListener('click', () => {
      a.phase = btn.dataset.phase;
      a.current = { weight: '', reps: '' };
      render();
    });
  });

  const wIn = document.getElementById('wIn');
  const rIn = document.getElementById('rIn');
  if (wIn) wIn.addEventListener('input', e => { a.current.weight = e.target.value; });
  if (rIn) rIn.addEventListener('input', e => { a.current.reps = e.target.value; });
  document.querySelectorAll('[data-w-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseFloat(btn.dataset.wAdj);
      const cur = parseFloat(wIn.value);
      const next = isNaN(cur) ? delta : Math.max(0, Math.round((cur + delta) * 10) / 10);
      wIn.value = next;
      a.current.weight = String(next);
    });
  });
  document.querySelectorAll('[data-r-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.rAdj, 10);
      const cur = parseInt(rIn.value, 10);
      const next = isNaN(cur) ? Math.max(0, delta) : Math.max(0, cur + delta);
      rIn.value = next;
      a.current.reps = String(next);
    });
  });

  const finishSetBtn = document.getElementById('finishSetBtn');
  if (finishSetBtn) finishSetBtn.addEventListener('click', finishSet);

  document.querySelectorAll('[data-rmset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [kind, idx] = btn.dataset.rmset.split(':');
      const arr = kind === 'warmup' ? a.warmupSets : a.workingSets;
      arr.splice(+idx, 1);
      render();
    });
  });

  const addTime = document.getElementById('addTimeBtn');
  if (addTime) addTime.addEventListener('click', () => {
    a.timer.total += 30;
    a.timer.remaining += 30;
    render();
  });
  const nextSet = document.getElementById('nextSetBtn');
  if (nextSet) nextSet.addEventListener('click', () => { stopTimer(); render(); });

  const notes = document.getElementById('exNotes');
  if (notes) notes.addEventListener('input', e => { a.notes = e.target.value; });
  const finEx = document.getElementById('finishExBtn');
  if (finEx) finEx.addEventListener('click', finishExercise);
}

function finishSet() {
  const a = state.active;
  const wIn = document.getElementById('wIn');
  const rIn = document.getElementById('rIn');
  let weight = (wIn.value || '').trim();
  const reps = parseInt(rIn.value, 10);
  if (!reps || reps <= 0) { toast('Enter reps', 'error'); return; }
  if (/^(bw|bodyweight)$/i.test(weight)) weight = '';
  const entry = { weight: weight, reps: reps };
  if (a.phase === 'warmup') a.warmupSets.push(entry); else a.workingSets.push(entry);
  a.current = { weight: '', reps: '' };
  startTimer(a.restSec);
  render();
}

function startTimer(sec) {
  const a = state.active;
  a.timer = { total: sec, remaining: sec, startedAt: Date.now() };
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(tickTimer, 250);
}

function tickTimer() {
  const a = state.active;
  if (!a || !a.timer) return;
  const elapsed = (Date.now() - a.timer.startedAt) / 1000;
  a.timer.remaining = a.timer.total - elapsed;
  const card = document.querySelector('.timer-card');
  if (!card) return;
  const disp = card.querySelector('.t-display');
  const prog = card.querySelector('.t-progress');
  const isOver = a.timer.remaining < 0;
  if (disp) {
    disp.textContent = (isOver ? '+' : '') + formatTime(Math.abs(a.timer.remaining));
    disp.classList.toggle('pulse', a.timer.remaining <= 10 && a.timer.remaining >= 0);
  }
  if (prog) {
    prog.style.width = isOver ? '0%' : Math.max(0, (a.timer.remaining / a.timer.total) * 100) + '%';
  }
  card.classList.toggle('overtime', isOver);
  const label = card.querySelector('.t-label');
  if (label) label.textContent = isOver ? 'Rest Overtime' : 'Resting';
  if (!a.timer.alerted && a.timer.remaining <= 0) {
    a.timer.alerted = true;
    try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
    try { beep(); } catch (e) {}
  }
}

function stopTimer() {
  const a = state.active;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  const arr = a.phase === 'warmup' ? a.warmupSets : a.workingSets;
  const last = arr[arr.length - 1];
  if (last && a.timer) {
    last.restAfter = Math.max(0, a.timer.total - a.timer.remaining);
  }
  a.timer = null;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.value = 0.1;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); ctx.close(); }, 220);
  } catch (e) {}
}

function finishExercise() {
  const a = state.active;
  if (a.workingSets.length === 0) { toast('Log at least one working set', 'error'); return; }
  const setsString = formatExerciseSets(a.warmupSets, a.workingSets);
  state.session.entries.push({
    exercise: a.name,
    sets: setsString,
    notes: a.notes || ''
  });
  state.session.lastExercise = a.name;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.active = null;
  state.view = 'session';
  toast('Saved ' + a.name, 'success');
  render();
}

// ============================================================
// PICKER
// ============================================================
function openExercisePicker(forType, afterExercise) {
  state.picker = {
    open: true, query: '', forType: forType, afterExercise: afterExercise,
    onPick: (name) => {
      state.picker.open = false;
      openExerciseScreen(name);
    }
  };
  render();
}

function renderPicker() {
  const p = state.picker;
  const exclude = state.session ? state.session.entries.map(e => e.exercise) : [];
  let list = rankExercises(p.forType, exclude, p.afterExercise);
  if (p.query) {
    const q = p.query.toLowerCase();
    list = list.filter(e => e.name.toLowerCase().includes(q));
  }
  const customAvail = p.query.trim().length > 0 &&
    !list.some(e => e.name.toLowerCase() === p.query.trim().toLowerCase());
  return `
    <div class="modal-backdrop" id="pickerBackdrop">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <h3>Pick exercise · ${escapeHtml(p.forType || '')}</h3>
          <button class="icon-btn" id="closePicker">×</button>
        </div>
        <div class="modal-body">
          <input id="pickerSearch" type="text" placeholder="Search or add new…" value="${escapeHtml(p.query)}" autofocus />
          <div style="height: 10px;"></div>
          ${customAvail ? `
            <button class="ex-item" data-custom="${escapeHtml(p.query.trim())}" style="border-color: var(--accent); margin-bottom: 6px;">
              <span class="ex-name">+ Add "${escapeHtml(p.query.trim())}" as new exercise</span>
            </button>
          ` : ''}
          ${list.length === 0
            ? `<div class="empty-state">No matches. Type a name above to add it.</div>`
            : list.slice(0, 60).map(e => {
                const last = e.history && e.history[0];
                const starred = e._nextScore > 0;
                return `
                  <button class="ex-item" data-pick="${escapeHtml(e.name)}">
                    <div style="flex:1; min-width:0;">
                      <div style="display:flex; align-items:center; gap: 6px;">
                        ${starred ? '<span class="ex-badge" style="color: var(--accent); border-color: var(--accent);">Next</span>' : ''}
                        <span class="ex-name">${escapeHtml(e.name)}</span>
                      </div>
                    </div>
                    ${last ? `<span class="ex-last">${escapeHtml(last.sets)}</span>` : ''}
                  </button>
                `;
              }).join('')
          }
        </div>
      </div>
    </div>
  `;
}

function bindPicker() {
  const close = () => {
    state.picker.open = false;
    state.picker.query = '';
    const el = document.getElementById('pickerBackdrop');
    if (el) el.remove();
  };
  document.getElementById('closePicker').addEventListener('click', close);
  document.getElementById('pickerBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'pickerBackdrop') close();
  });
  const search = document.getElementById('pickerSearch');
  search.addEventListener('input', e => {
    state.picker.query = e.target.value;
    refreshPicker();
  });
  document.querySelectorAll('[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.pick;
      const cb = state.picker.onPick;
      close();
      cb && cb(name);
    });
  });
  document.querySelectorAll('[data-custom]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.custom;
      const cb = state.picker.onPick;
      close();
      cb && cb(name);
    });
  });
}

function refreshPicker() {
  const el = document.getElementById('pickerBackdrop');
  if (el) el.remove();
  document.body.insertAdjacentHTML('beforeend', renderPicker());
  bindPicker();
  const s = document.getElementById('pickerSearch');
  if (s) { s.focus(); const v = s.value; s.value = ''; s.value = v; }
}

// ============================================================
// SAVE
// ============================================================
async function saveSession() {
  const s = state.session;
  if (!s || s.entries.length === 0) { toast('Nothing to save', 'error'); return; }
  const btn = document.getElementById('finishSessionBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Saving…'; }
  try {
    await api('addSession', { date: s.date, sessionType: s.type, entries: s.entries });
    toast('Session saved to "Web app" tab', 'success');
    state.session = null;
    state.view = 'home';
    await loadData();
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Finish & Save Session'; }
  }
}

// ============================================================
// PROGRESS (exercise list)
// ============================================================
function renderProgress() {
  const d = state.data || { exercises: [] };
  const type = state.progress.typeFilter || 'push';
  const q = (state.progress.query || '').toLowerCase();

  // Only show exercises that have at least one Sheet 8 session AND classify to the selected type
  const list = d.exercises
    .map(e => {
      const hist = fullHistoryFor(e.name);  // already Sheet 8 filtered
      return { ex: e, hist, sessionCount: hist.length, exType: classifyExercise(e.name) };
    })
    .filter(item => item.sessionCount > 0 && item.exType === type)
    .filter(item => !q || item.ex.name.toLowerCase().includes(q))
    .sort((a, b) => b.sessionCount - a.sessionCount);

  const totalSheet8Exercises = d.exercises.filter(e => {
    const h = fullHistoryFor(e.name);
    return h.length > 0;
  }).length;

  const typeLabel = { push: 'Push', pull: 'Pull', legs: 'Legs' }[type] || 'Push';

  return `
    <div class="hero">
      <div class="kicker">Progress</div>
      <div class="count mono">${totalSheet8Exercises}</div>
      <div class="sub">exercises tracked since Mar 2026</div>
    </div>

    <div class="prog-tabs">
      <button class="prog-tab ${type === 'push' ? 'on push' : ''}" data-prog-type="push">Push</button>
      <button class="prog-tab ${type === 'pull' ? 'on pull' : ''}" data-prog-type="pull">Pull</button>
      <button class="prog-tab ${type === 'legs' ? 'on legs' : ''}" data-prog-type="legs">Legs</button>
    </div>

    <div class="ex-browse">
      <input id="progSearch" type="text" placeholder="Search ${escapeHtml(typeLabel.toLowerCase())} exercises…" value="${escapeHtml(state.progress.query)}" />
      <div class="eb-list">
        ${list.length === 0
          ? `<div class="empty-state">No ${escapeHtml(typeLabel.toLowerCase())} exercises logged yet.</div>`
          : list.map(({ex, hist, sessionCount}) => {
              const latest = hist[hist.length - 1];
              const latestMetric = latest && latest.metrics ? latest.metrics.est1RM + 'kg est.' : (latest && latest.cardio ? 'cardio' : '—');
              return `
                <button class="eb-item" data-exdetail="${escapeHtml(ex.name)}">
                  <div style="flex:1; min-width:0;">
                    <div class="eb-name">${escapeHtml(ex.name)}</div>
                    <div class="eb-meta">${sessionCount} session${sessionCount !== 1 ? 's' : ''} · latest: ${escapeHtml(latestMetric)}</div>
                  </div>
                  <span style="color: var(--text-faint); font-size: 18px;">›</span>
                </button>
              `;
            }).join('')
        }
      </div>
    </div>
  `;
}

function bindProgress() {
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.querySelectorAll('[data-prog-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.typeFilter = btn.dataset.progType;
      render();
    });
  });
  const search = document.getElementById('progSearch');
  if (search) {
    search.addEventListener('input', e => {
      state.progress.query = e.target.value;
      render();
      const s2 = document.getElementById('progSearch');
      if (s2) { s2.focus(); const v = s2.value; s2.value = ''; s2.value = v; }
    });
  }
  document.querySelectorAll('[data-exdetail]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.selectedExercise = btn.dataset.exdetail;
      state.view = 'exDetail';
      render();
    });
  });
}

// ============================================================
// EXERCISE DETAIL (graph)
// ============================================================
function renderExDetail() {
  const name = state.progress.selectedExercise;
  if (!name) { state.view = 'progress'; return ''; }
  const hist = fullHistoryFor(name);
  const muscles = musclesFor(name);
  const metric = state.progress.metric; // '1rm' | 'top' | 'volume'

  // Extract points
  const points = hist.filter(h => h.metrics).map(h => ({
    date: h.dateObj,
    dateLabel: h.date,
    value: metric === '1rm' ? h.metrics.est1RM : (metric === 'top' ? h.metrics.topSet : h.metrics.volume),
    sets: h.sets,
    rawSets: h.parsed
  }));

  const first = points[0];
  const last = points[points.length - 1];
  const delta = (first && last) ? (last.value - first.value) : 0;
  const deltaPct = (first && first.value) ? (delta / first.value) * 100 : 0;
  const unit = metric === 'volume' ? 'kg·reps' : 'kg';
  const metricLabel = metric === '1rm' ? 'Est. 1RM (Epley)' : (metric === 'top' ? 'Top Set Weight' : 'Total Volume');

  return `
    <div class="ex-hero">
      <div class="ex-kicker">Progress</div>
      <div class="ex-title">${escapeHtml(name)}</div>
    </div>

    ${renderMuscleBox(muscles, { label: 'Muscles worked' })}

    <div class="chart-box">
      <div class="metric-toggle">
        <button class="${metric === '1rm' ? 'on' : ''}" data-metric="1rm">Est. 1RM</button>
        <button class="${metric === 'top' ? 'on' : ''}" data-metric="top">Top Set</button>
        <button class="${metric === 'volume' ? 'on' : ''}" data-metric="volume">Volume</button>
      </div>
      <div class="cb-head">
        <div>
          <div class="cb-label">${escapeHtml(metricLabel)}</div>
          <div class="cb-value">
            ${last ? formatNum(last.value) : '—'}<span class="cb-unit">${last ? unit : ''}</span>
          </div>
          ${first && last && first !== last ? `
            <div class="cb-delta ${delta > 0 ? 'up' : (delta < 0 ? 'down' : '')}">
              ${delta > 0 ? '+' : ''}${formatNum(delta)}${unit} (${delta > 0 ? '+' : ''}${deltaPct.toFixed(1)}%) since ${escapeHtml(first.dateLabel)}
            </div>
          ` : `<div class="cb-delta">First data point</div>`}
        </div>
      </div>
      ${points.length >= 2
        ? renderChart(points)
        : `<div class="empty-state">Need at least 2 sessions to plot progress.</div>`
      }
    </div>

    <div class="section-title">
      <h3>History</h3>
      <span class="meta">${hist.length} session${hist.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="hist-table">
      ${hist.length === 0
        ? `<div class="empty-state">No history yet.</div>`
        : hist.slice().reverse().map(h => `
          <div class="hist-row">
            <span class="h-date">${escapeHtml(h.date)}</span>
            <span class="h-sets">${escapeHtml(h.sets)}</span>
            <span class="h-1rm">${h.metrics ? formatNum(h.metrics.est1RM) + 'kg' : (h.cardio ? 'cardio' : '—')}</span>
          </div>
        `).join('')
      }
    </div>
  `;
}

function formatNum(n) {
  if (typeof n !== 'number') return String(n);
  if (n >= 1000) return Math.round(n).toLocaleString();
  return (Math.round(n * 10) / 10).toString();
}

function renderChart(points) {
  const W = 500, H = 220, padL = 34, padR = 12, padT = 16, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const xs = points.map(p => p.date.getTime());
  const ys = points.map(p => p.value);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = 0, yMax = Math.max(...ys) * 1.1 || 1;
  const xScale = t => padL + (xMax === xMin ? innerW / 2 : ((t - xMin) / (xMax - xMin)) * innerW);
  const yScale = v => padT + innerH - (v / yMax) * innerH;

  // Line path
  const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.date.getTime()).toFixed(1)},${yScale(p.value).toFixed(1)}`).join(' ');
  // Area path (fill under line)
  const area = d + ` L${xScale(xMax).toFixed(1)},${padT + innerH} L${xScale(xMin).toFixed(1)},${padT + innerH} Z`;

  // Y-axis labels (4 ticks)
  const yTicks = [];
  const tickCount = 4;
  for (let i = 0; i <= tickCount; i++) {
    const v = (yMax * i) / tickCount;
    yTicks.push({ v, y: yScale(v) });
  }

  // X-axis labels: first, last, and maybe 1-2 in between if wide enough
  const xLabels = [{ p: points[0], x: xScale(points[0].date.getTime()) }];
  if (points.length >= 3) {
    const mid = points[Math.floor(points.length / 2)];
    xLabels.push({ p: mid, x: xScale(mid.date.getTime()) });
  }
  if (points.length >= 2) {
    xLabels.push({ p: points[points.length - 1], x: xScale(points[points.length - 1].date.getTime()) });
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#e8ff3a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#e8ff3a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks.map(t => `
        <line class="grid" x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}"/>
        <text class="axis-lbl" x="${padL - 4}" y="${t.y + 3}" text-anchor="end">${formatNum(t.v)}</text>
      `).join('')}
      <path class="area" d="${area}" />
      <path class="line" d="${d}" />
      ${points.map((p, i) => {
        const cx = xScale(p.date.getTime()).toFixed(1);
        const cy = yScale(p.value).toFixed(1);
        const cls = i === points.length - 1 ? 'pt-last' : 'pt';
        const r = i === points.length - 1 ? 4 : 2.5;
        return `<circle class="${cls}" cx="${cx}" cy="${cy}" r="${r}"/>`;
      }).join('')}
      ${xLabels.map(l => `
        <text class="axis-lbl" x="${l.x.toFixed(1)}" y="${H - 8}" text-anchor="middle">${escapeHtml(l.p.dateLabel)}</text>
      `).join('')}
    </svg>
  `;
}

function bindExDetail() {
  document.getElementById('backBtn').addEventListener('click', () => {
    state.view = 'progress'; render();
  });
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  bindMuscleToggle();
  document.querySelectorAll('[data-metric]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.progress.metric = btn.dataset.metric;
      render();
    });
  });
}

// ============================================================
// UTIL
// ============================================================
function openSettings() {
  if (confirm('Reset connection and re-enter the web app URL?')) {
    localStorage.removeItem(LS_URL);
    state.endpoint = '';
    state.data = null;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.session = null;
    state.active = null;
    state.view = 'setup';
    render();
  }
}

function toast(msg, kind) {
  const el = document.createElement('div');
  el.className = 'toast ' + (kind || '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; }, 2400);
  setTimeout(() => el.remove(), 2800);
}

// ============================================================
// BOOT
// ============================================================
if (state.endpoint) loadData(); else render();
